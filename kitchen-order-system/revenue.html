<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Restaurant Analytics Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
    --primary:#2563eb;
    --success:#16a34a;
    --warning:#ea580c;
    --danger:#dc2626;
    --dark:#0f172a;
    --card:#ffffff;
    --bg:#f1f5f9;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:var(--bg);
    color:#111827;
}

.sidebar{
    position:fixed;
    width:260px;
    height:100vh;
    background:var(--dark);
    color:white;
    padding:25px;
}

.logo{
    font-size:28px;
    font-weight:800;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu a{
    text-decoration:none;
    color:#cbd5e1;
    padding:14px;
    border-radius:12px;
    transition:.2s;
    font-weight:500;
}

.menu a:hover{
    background:#1e293b;
    color:white;
}

.main{
    margin-left:260px;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.topbar h1{
    font-size:32px;
    font-weight:800;
}

.date{
    background:white;
    padding:12px 18px;
    border-radius:14px;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:24px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    border:1px solid var(--border);
}

.card h3{
    color:#64748b;
    font-size:15px;
    margin-bottom:10px;
}

.card .value{
    font-size:36px;
    font-weight:800;
}

.blue{color:var(--primary);}
.green{color:var(--success);}
.orange{color:var(--warning);}
.red{color:var(--danger);}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
    margin-bottom:25px;
}

.panel{
    background:white;
    padding:25px;
    border-radius:24px;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
    border:1px solid var(--border);
}

.panel h2{
    margin-bottom:20px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:8px;
    font-weight:600;
    font-size:14px;
}

.input-group input,
.input-group select{
    padding:14px;
    border:1px solid var(--border);
    border-radius:14px;
    outline:none;
    font-size:15px;
}

button{
    background:var(--primary);
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:14px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#eff6ff;
    color:#1e3a8a;
    text-align:left;
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #f1f5f9;
}

.badge{
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

.chart-container{
    height:350px;
}

@media(max-width:1000px){

    .grid{
        grid-template-columns:1fr;
    }

    .form-grid{
        grid-template-columns:1fr;
    }
}

@media(max-width:768px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">RESTO PRO</div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Revenue</a>
        <a href="#">Reports</a>
        <a href="#">Managers</a>
        <a href="#">Settings</a>
    </div>

</div>

<div class="main">

    <div class="topbar">
        <h1>Restaurant Analytics</h1>
        <div class="date" id="todayDate"></div>
    </div>

    <!-- STATISTICS -->

    <div class="cards">

        <div class="card">
            <h3>Total Revenue</h3>
            <div class="value green" id="totalRevenue">0 EGP</div>
        </div>

        <div class="card">
            <h3>Total Covers</h3>
            <div class="value blue" id="totalCovers">0</div>
        </div>

        <div class="card">
            <h3>Average Spend</h3>
            <div class="value orange" id="avgSpend">0 EGP</div>
        </div>

        <div class="card">
            <h3>Best Restaurant</h3>
            <div class="value red" id="bestRestaurant">-</div>
        </div>

    </div>

    <div class="grid">

        <!-- ENTRY PANEL -->

        <div class="panel">

            <h2>Daily Report Entry</h2>

            <div class="form-grid">

                <div class="input-group">
                    <label>Restaurant</label>
                    <select id="restaurant">
                        <option>Restaurant A</option>
                        <option>Restaurant B</option>
                        <option>Restaurant C</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Covers</label>
                    <input type="number" id="covers">
                </div>

                <div class="input-group">
                    <label>Revenue (EGP)</label>
                    <input type="number" id="revenue">
                </div>

                <div class="input-group">
                    <label>Manager</label>
                    <input type="text" id="manager">
                </div>

            </div>

            <br>

            <button onclick="saveData()">Save Report</button>

        </div>

        <!-- CHART -->

        <div class="panel">

            <h2>Revenue Analytics</h2>

            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>

        </div>

    </div>

    <!-- TABLE -->

    <div class="panel">

        <h2>Today Reports</h2>

        <table>

            <thead>
                <tr>
                    <th>Restaurant</th>
                    <th>Covers</th>
                    <th>Revenue</th>
                    <th>Manager</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>

        </table>

    </div>

</div>

<script>

// FIREBASE CONFIG

const firebaseConfig = {

    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// DATE

const today = new Date().toISOString().split('T')[0];
document.getElementById("todayDate").innerText = today;

// CHART

const ctx = document.getElementById('revenueChart');

const revenueChart = new Chart(ctx, {

    type: 'bar',

    data: {
        labels: ['Restaurant A', 'Restaurant B', 'Restaurant C'],
        datasets: [{
            label: 'Revenue',
            data: [0,0,0],
            borderWidth: 2
        }]
    },

    options: {
        responsive:true,
        maintainAspectRatio:false
    }

});

// SAVE DATA

async function saveData(){

    const restaurant = document.getElementById("restaurant").value;
    const covers = Number(document.getElementById("covers").value);
    const revenue = Number(document.getElementById("revenue").value);
    const manager = document.getElementById("manager").value;

    if(!covers || !revenue || !manager){

        alert("Please fill all fields");
        return;
    }

    await db.collection("dailyReports").add({

        restaurant,
        covers,
        revenue,
        manager,
        date: today,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()

    });

    alert("Saved Successfully");

    loadData();

    document.getElementById("covers").value = "";
    document.getElementById("revenue").value = "";
    document.getElementById("manager").value = "";
}

// LOAD DATA

async function loadData(){

    const snapshot = await db.collection("dailyReports")
    .where("date","==",today)
    .get();

    let tableHTML = "";

    let totalRevenue = 0;
    let totalCovers = 0;

    let revenueMap = {
        "Restaurant A":0,
        "Restaurant B":0,
        "Restaurant C":0
    };

    snapshot.forEach(doc=>{

        const data = doc.data();

        totalRevenue += data.revenue;
        totalCovers += data.covers;

        revenueMap[data.restaurant] += data.revenue;

        tableHTML += `

        <tr>
            <td>${data.restaurant}</td>
            <td>${data.covers}</td>
            <td>${data.revenue.toLocaleString()} EGP</td>
            <td>${data.manager}</td>
            <td><span class="badge">Submitted</span></td>
        </tr>

        `;
    });

    document.getElementById("tableBody").innerHTML = tableHTML;

    document.getElementById("totalRevenue").innerText =
        totalRevenue.toLocaleString() + " EGP";

    document.getElementById("totalCovers").innerText =
        totalCovers;

    const avg =
        totalCovers > 0
        ? (totalRevenue / totalCovers).toFixed(2)
        : 0;

    document.getElementById("avgSpend").innerText =
        avg + " EGP";

    // BEST RESTAURANT

    let best = "-";
    let maxRevenue = 0;

    for(let key in revenueMap){

        if(revenueMap[key] > maxRevenue){

            maxRevenue = revenueMap[key];
            best = key;
        }
    }

    document.getElementById("bestRestaurant").innerText = best;

    // UPDATE CHART

    revenueChart.data.datasets[0].data = [

        revenueMap["Restaurant A"],
        revenueMap["Restaurant B"],
        revenueMap["Restaurant C"]

    ];

    revenueChart.update();
}

loadData();

</script>

</body>
</html>
