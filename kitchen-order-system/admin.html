<script>
const ADMIN_PASSWORDS = { "Marco": "M1r50123", "Nady": "Nn639123", "Ahmed": "j1cadm1n", "Nader": "nader123" };
const KITCHENS = ["Hot Kitchen", "Cold Kitchen", "Pastry / Bakery", "Butchery", "Beach House", "Nihon Kitchen", "Staff Kitchen"];

let currentAdmin = "";
let currentKitchen = "all";
let currentStatus = "pending";
let allRequests = [];
let selectedUser = "";
let duplicateMap = new Map();

// ============ NAVIGATION FUNCTIONS ============
function goBackToIndex() { window.location.href = "index.html"; }
function openAnalytics() { window.open("analytics.html", "_blank"); }
function openRevenue() { window.open("revenue.html", "_blank"); }

// ============ OPEN DEVELOPER CONSOLE ============
function openDevConsole() {
    // Open the developer console in a new tab
    window.open("dev_console.html", "_blank");
}

function selectUser(user) {
    selectedUser = user;
    document.getElementById("passwordInput").style.display = "block";
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("passwordInput").placeholder = `Password for ${user}`;
    document.getElementById("loginError").innerHTML = "";
}

function checkLogin() {
    const pass = document.getElementById("passwordInput").value;
    if(selectedUser && ADMIN_PASSWORDS[selectedUser] === pass) {
        currentAdmin = selectedUser;
        document.getElementById("adminNameDisplay").innerText = currentAdmin;
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        localStorage.setItem("admin", currentAdmin);
        loadRequests();
    } else {
        document.getElementById("loginError").innerHTML = "❌ Wrong password!";
    }
}

async function loadRequests() {
    try {
        const snapshot = await db.collection("kitchen_requests").orderBy("timestamp", "desc").get();
        allRequests = [];
        snapshot.forEach(doc => allRequests.push({ id: doc.id, ...doc.data() }));
        findDuplicateRequests();
        renderUI();
        updateStats();
    } catch(e) { showToast("Error loading: " + e.message); }
}

function findDuplicateRequests() {
    duplicateMap.clear();
    const signatureMap = new Map();
    for (const req of allRequests) {
        const itemSignature = req.items.map(item => `${item.code}|${item.originalQty}`).join(';');
        const signature = `${req.section}|${req.chefName}|${itemSignature}`;
        if (!signatureMap.has(signature)) signatureMap.set(signature, []);
        signatureMap.get(signature).push(req);
    }
    for (const [sig, requests] of signatureMap.entries()) {
        if (requests.length > 1) {
            for (const req of requests) {
                duplicateMap.set(req.id, { isDuplicate: true, count: requests.length });
            }
        }
    }
}

function getRequestStatus(items) {
    if(!items || items.length === 0) return "pending";
    let allProcessed = true;
    let approved = 0, rejected = 0;
    items.forEach(item => {
        if(item.status === "approved") approved++;
        else if(item.status === "rejected") rejected++;
        else allProcessed = false;
    });
    if(items.length > 0 && items[0].completedVia === "accept") return "accepted";
    if(allProcessed) {
        if(approved === items.length) return "approved";
        if(rejected === items.length) return "rejected";
        return "accepted";
    }
    return "pending";
}

async function updateRequest(id, items) {
    try {
        await db.collection("kitchen_requests").doc(id).update({ items });
        showToast(`✅ Updated by ${currentAdmin}`);
        await loadRequests();
        return true;
    } catch(e) { showToast("Update error: " + e.message); return false; }
}

async function approveItemFlex(reqId, idx) {
    const input = document.getElementById(`qty_${reqId}_${idx}`);
    let qty = parseFloat(input?.value || 0);
    if(isNaN(qty) || qty < 0) { showToast("Enter a valid quantity (0 or more)"); return; }
    const req = allRequests.find(r => r.id === reqId);
    if(req) {
        const item = req.items[idx];
        item.status = "approved";
        item.approvedQty = qty;
        item.approvedBy = currentAdmin;
        item.approvedAt = new Date().toLocaleString();
        delete item.rejectionReason;
        delete item.rejectedBy;
        delete item.rejectedAt;
        await updateRequest(reqId, req.items);
    }
}

async function rejectItem(reqId, idx) {
    const reason = prompt(`Rejection reason (${currentAdmin}):`, "Out of stock or unavailable");
    if(reason) {
        const req = allRequests.find(r => r.id === reqId);
        if(req) {
            req.items[idx].status = "rejected";
            req.items[idx].rejectionReason = reason;
            req.items[idx].rejectedBy = currentAdmin;
            req.items[idx].rejectedAt = new Date().toLocaleString();
            req.items[idx].approvedQty = 0;
            delete req.items[idx].approvedBy;
            delete req.items[idx].approvedAt;
            await updateRequest(reqId, req.items);
        }
    }
}

async function approveAllFlex(reqId) {
    if(!confirm(`Approve ALL items with current quantities?`)) return;
    const req = allRequests.find(r => r.id === reqId);
    if(req) {
        for(let i=0; i<req.items.length; i++) {
            const input = document.getElementById(`qty_${reqId}_${i}`);
            let qty = parseFloat(input?.value || 0);
            if(isNaN(qty)) qty = 0;
            const item = req.items[i];
            item.status = "approved";
            item.approvedQty = qty;
            item.approvedBy = currentAdmin;
            item.approvedAt = new Date().toLocaleString();
            delete item.rejectionReason;
        }
        await updateRequest(reqId, req.items);
    }
}

async function rejectAll(reqId) {
    const reason = prompt(`Rejection reason for ALL (${currentAdmin}):`, "Not available");
    if(reason) {
        const req = allRequests.find(r => r.id === reqId);
        if(req) {
            req.items.forEach(item => {
                item.status = "rejected";
                item.rejectionReason = reason;
                item.rejectedBy = currentAdmin;
                item.rejectedAt = new Date().toLocaleString();
                item.approvedQty = 0;
            });
            await updateRequest(reqId, req.items);
        }
    }
}

async function acceptRequest(reqId) {
    if(!confirm(`✅ ACCEPT REQUEST? Pending items will be AUTO-APPROVED with original quantities.`)) return;
    const req = allRequests.find(r => r.id === reqId);
    if(req) {
        let autoApprovedCount = 0;
        req.items.forEach(item => {
            if(item.status !== "approved" && item.status !== "rejected") {
                item.status = "approved";
                item.approvedQty = item.originalQty;
                item.approvedBy = currentAdmin;
                item.approvedAt = new Date().toLocaleString();
                autoApprovedCount++;
                delete item.rejectionReason;
            }
            item.completedVia = "accept";
        });
        await updateRequest(reqId, req.items);
        showToast(`✅ Request accepted! ${autoApprovedCount} items auto-approved.`);
    }
}

function copyFirebaseId(docId) {
    navigator.clipboard.writeText(docId);
    showToast(`📋 Firebase Doc ID copied: ${docId}`);
}

function showResetConfirmModal() {
    const toDelete = allRequests.filter(req => getRequestStatus(req.items) !== "pending");
    if(toDelete.length === 0) { showToast("ℹ️ No completed requests to delete"); return; }
    const modal = document.createElement('div');
    modal.className = 'confirm-modal';
    modal.innerHTML = `
        <div class="confirm-modal-content">
            <h3>⚠️ PERMANENT DELETION ⚠️</h3>
            <p>Delete <strong>${toDelete.length}</strong> completed request(s)?</p>
            <p class="warning-text" style="color:#e74c3c; margin:15px 0;">This action cannot be undone!</p>
            <div class="confirm-buttons" style="display:flex; gap:12px;">
                <button class="btn-cancel-delete" style="background:#95a5a6; padding:12px; border-radius:40px; flex:1;" onclick="this.closest('.confirm-modal').remove()">Cancel</button>
                <button class="btn-confirm-delete" id="confirmDeleteBtn" style="background:#e74c3c; padding:12px; border-radius:40px; flex:1;">Delete</button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
    const confirmBtn = modal.querySelector('#confirmDeleteBtn');
    confirmBtn.onclick = async () => {
        modal.remove();
        let deletedCount = 0;
        for(const req of toDelete) {
            try { await db.collection("kitchen_requests").doc(req.id).delete(); deletedCount++; }
            catch(e) { console.error(e); }
        }
        await loadRequests();
        showToast(`✅ Deleted ${deletedCount} completed requests.`);
    };
}

function exportExcel() {
    if(!allRequests.length) { showToast("No data"); return; }
    let csv = "Firestore Doc ID,Request ID,Kitchen,Chef,Date,Item,Code,Requested Qty,Unit,Price,Approved Qty,Status,Action By,Total Value\n";
    allRequests.forEach(req => {
        req.items.forEach(item => {
            const price = item.price || 0;
            const approvedQty = item.status === "approved" ? (item.approvedQty || 0) : 0;
            const totalValue = approvedQty * price;
            let statusText = item.status, actionBy = "";
            if(item.status === "approved") { statusText = "Approved"; actionBy = item.approvedBy || ""; }
            else if(item.status === "rejected") { statusText = "Rejected"; actionBy = item.rejectedBy || ""; }
            else if(item.completedVia === "accept") { statusText = "Accepted"; actionBy = item.approvedBy || ""; }
            else { statusText = "Pending"; actionBy = "-"; }
            csv += `"${req.id}","${req.requestId}","${req.section}","${req.chefName}","${req.submittedAt}","${item.name}","${item.code}",${item.originalQty},"${item.unit}",${price},${approvedQty},"${statusText}","${actionBy}",${totalValue}\n`;
        });
    });
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `firebase_requests_${Date.now()}.csv`;
    link.click();
}

function updateStats() {
    let pending=0, approved=0, rejected=0, accepted=0;
    allRequests.forEach(req => {
        const s = getRequestStatus(req.items);
        if(s === "pending") pending++;
        else if(s === "approved") approved++;
        else if(s === "rejected") rejected++;
        else if(s === "accepted") accepted++;
    });
    document.getElementById("pendingCount").innerText = pending;
    document.getElementById("approvedCount").innerText = approved;
    document.getElementById("rejectedCount").innerText = rejected;
    document.getElementById("acceptedCount").innerText = accepted;
    document.getElementById("totalCount").innerText = allRequests.length;
}

function setFilter(status) { currentStatus = status; renderUI(); }
function filterKitchen(kitchen) { currentKitchen = kitchen; renderUI(); }

function renderUI() {
    const kitchenDiv = document.getElementById("kitchenFilters");
    kitchenDiv.innerHTML = `<button class="kitchen-filter-btn ${currentKitchen === 'all' ? 'active' : ''}" onclick="filterKitchen('all')">📋 All</button>`;
    KITCHENS.forEach(k => {
        let icon = k === 'Hot Kitchen' ? '🔥' : k === 'Cold Kitchen' ? '❄️' : k === 'Pastry / Bakery' ? '🍰' : k === 'Butchery' ? '🥩' : k === 'Beach House' ? '🏖️' : k === 'Nihon Kitchen' ? '🍜' : '👥';
        kitchenDiv.innerHTML += `<button class="kitchen-filter-btn ${currentKitchen === k ? 'active' : ''}" onclick="filterKitchen('${k}')">${icon} ${k.split(' ')[0]}</button>`;
    });
    
    const tabsDiv = document.getElementById("statusTabs");
    tabsDiv.innerHTML = "";
    ["pending","approved","rejected","accepted","all"].forEach(s => {
        const label = {pending:"⏳ Pending",approved:"✅ Approved",rejected:"❌ Rejected",accepted:"🟣 Accepted",all:"📋 All"}[s];
        tabsDiv.innerHTML += `<button class="tab-btn ${currentStatus === s ? 'active' : ''}" onclick="setFilter('${s}')">${label}</button>`;
    });
    
    let filtered = allRequests.filter(r => (currentKitchen === "all" || r.section === currentKitchen) && (currentStatus === "all" || getRequestStatus(r.items) === currentStatus));
    const container = document.getElementById("requestsContainer");
    if(!filtered.length) { container.innerHTML = `<div class="empty-state">📭 No requests found</div>`; return; }
    
    container.innerHTML = "";
    filtered.forEach(req => {
        const requestStatus = getRequestStatus(req.items);
        const kitchenClass = { "Hot Kitchen":"kitchen-hot","Cold Kitchen":"kitchen-cold","Pastry / Bakery":"kitchen-pastry","Butchery":"kitchen-butchery","Beach House":"kitchen-beach","Nihon Kitchen":"kitchen-nihon","Staff Kitchen":"kitchen-staff" }[req.section] || "kitchen-staff";
        const duplicateInfo = duplicateMap.get(req.id);
        const duplicateWarning = duplicateInfo ? `<span class="duplicate-warning">⚠️ DUPLICATE (${duplicateInfo.count} identical)</span>` : '';
        
        let requestedTotalValue = 0, approvedTotalValue = 0;
        req.items.forEach(item => {
            const price = item.price || 0;
            requestedTotalValue += (item.originalQty || 0) * price;
            if(item.status === "approved") approvedTotalValue += (item.approvedQty || 0) * price;
        });
        
        let hasIndividualAction = false;
        let isCompleted = false;
        if(requestStatus === "pending") {
            hasIndividualAction = req.items.some(item => item.status === "approved" || item.status === "rejected");
        } else { isCompleted = true; }
        
        const firebaseIdHtml = `<span class="firebase-id-badge" onclick="copyFirebaseId('${req.id}')" title="Click to copy Firebase Document ID">
            <i>🆔</i> ${req.id.substring(0, 12)}... <span class="copy-icon">📋</span>
        </span>`;
        
        let itemsHtml = `<div class="table-wrapper"><table class="admin-table"><thead><tr><th>Code</th><th>Item</th><th>Requested Qty</th><th>Unit</th><th>Price/Unit</th><th>Admin Qty</th><th>Total</th><th>Action</th><th>Status</th></tr></thead><tbody>`;
        
        req.items.forEach((item, idx) => {
            const price = item.price || 0;
            if(item.status === "approved") {
                itemsHtml += `<tr style="background:#e8f5e9;"><td>${item.code}</td><td><b>${escapeHtml(item.name)}</b></td><td>${item.originalQty}</td><td>${item.unit}</td><td>${price.toFixed(2)}</td><td><strong>${(item.approvedQty || 0).toFixed(1)}</strong></td><td>${((item.approvedQty||0)*price).toFixed(2)}</td><td>✅ Approved</span></td><td><span class="status-approved-cell">Approved</span><div class="admin-info-text">👤 ${item.approvedBy || ''}<br>📅 ${item.approvedAt || ''}</div></td></tr>`;
            } else if(item.status === "rejected") {
                itemsHtml += `<tr style="background:#fee2e2;"><td>${item.code}</td><td><b>${escapeHtml(item.name)}</b></td><td>${item.originalQty}</td><td>${item.unit}</td><td>${price.toFixed(2)}</td><td>0</td><td>0.00</td><td>❌ Rejected</td><td><span class="status-rejected-cell">Rejected</span><div class="admin-info-text">👤 ${item.rejectedBy || ''}<br>📝 ${item.rejectionReason || ''}</div></td></tr>`;
            } else {
                const currentVal = (item.originalQty || 0).toFixed(1);
                itemsHtml += `<tr style="background:#fff8e7;"><td>${item.code}</td><td><b>${escapeHtml(item.name)}</b></td><td>${item.originalQty}</td><td>${item.unit}</td><td>${price.toFixed(2)}</td><td><input type="number" id="qty_${req.id}_${idx}" class="approval-input" value="${currentVal}" min="0" step="0.5"></td><td><span id="totalPreview_${req.id}_${idx}">${(item.originalQty * price).toFixed(2)}</span></td><td class="action-buttons"><button class="btn-approve" onclick="approveItemFlex('${req.id}', ${idx})">✅ Approve</button><button class="btn-reject" onclick="rejectItem('${req.id}', ${idx})">❌ Reject</button></td><td><span class="status-pending-cell">Pending</span><div class="admin-info-text">⚠️ Auto-approved on Accept</div></td></tr>`;
                setTimeout(() => {
                    const input = document.getElementById(`qty_${req.id}_${idx}`);
                    const totalSpan = document.getElementById(`totalPreview_${req.id}_${idx}`);
                    if(input && totalSpan) {
                        const updateTotal = () => { totalSpan.innerText = ((parseFloat(input.value)||0) * price).toFixed(2); };
                        input.addEventListener('input', updateTotal);
                        updateTotal();
                    }
                }, 10);
            }
        });
        itemsHtml += `</tbody></table></div>`;
        
        let actions = "";
        if(!isCompleted) {
            actions = `<div class="request-actions">
                <button class="btn-approve-all" onclick="approveAllFlex('${req.id}')" ${hasIndividualAction ? 'disabled' : ''}>✅ Approve All</button>
                <button class="btn-reject-all" onclick="rejectAll('${req.id}')" ${hasIndividualAction ? 'disabled' : ''}>❌ Reject All</button>
                <button class="btn-accept" onclick="acceptRequest('${req.id}')" ${!hasIndividualAction ? 'disabled' : ''}>🟣 Accept & Auto-Approve</button>
            </div>`;
        } else {
            actions = `<div class="request-actions"><button class="btn-accept" style="background:#6c757d;" disabled>🔒 Completed</button></div>`;
        }
        
        container.innerHTML += `<div class="request-card">
            <div class="request-header">
                <div>
                    <span class="request-id">📄 ${req.requestId || 'N/A'}</span>
                    ${firebaseIdHtml}
                    ${duplicateWarning}
                    <span class="kitchen-badge ${kitchenClass}" style="margin-left:10px;">${req.section}</span>
                </div>
                <div class="request-total-badge">
                    <span>💰 Requested: ${requestedTotalValue.toFixed(2)} EGP</span>
                    <span>✅ Approved: ${approvedTotalValue.toFixed(2)} EGP</span>
                </div>
                <span class="status-badge ${requestStatus === 'pending' ? 'status-pending' : (requestStatus === 'approved' ? 'status-approved' : (requestStatus === 'rejected' ? 'status-rejected' : 'status-accepted'))}">${requestStatus.toUpperCase()}</span>
            </div>
            <div class="request-info">
                <div class="info-item"><div class="info-label">👨‍🍳 CHEF</div><div class="info-value">${escapeHtml(req.chefName)}</div></div>
                <div class="info-item"><div class="info-label">📅 SUBMITTED</div><div class="info-value">${req.submittedAt || 'Unknown'}</div></div>
                <div class="info-item"><div class="info-label">🔥 FIRESTORE DOCUMENT ID</div><div class="info-value" style="font-family:monospace; font-size:11px;">${req.id}</div></div>
            </div>
            ${itemsHtml}
            ${actions}
        </div>`;
    });
    updateStats();
}

function logout() {
    if(confirm("Logout?")) { localStorage.removeItem("admin"); window.location.href = "index.html"; }
}
function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ''; }
function showToast(msg) { const t = document.createElement("div"); t.className = "toast"; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }

const saved = localStorage.getItem("admin");
if(saved && ADMIN_PASSWORDS[saved]) {
    currentAdmin = saved;
    document.getElementById("adminNameDisplay").innerText = currentAdmin;
    document.getElementById("passwordModal").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    loadRequests();
}
</script>
</body>
