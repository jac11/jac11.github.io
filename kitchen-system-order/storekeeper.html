<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Storekeeper Dashboard - Approved Orders</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.logo {
    font-size: 1.3rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    font-size: 1.6rem;
}

.logo span {
    color: #ffd700;
}

.header-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

.btn-header {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 18px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.3s;
    font-size: 13px;
}

.btn-header:hover {
    background: rgba(255,255,255,0.35);
    transform: translateY(-2px);
}

.refresh-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    padding: 8px 14px;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    font-weight: 700;
    font-size: 1.1rem;
    transition: all 0.3s;
}

.refresh-btn:hover {
    background: rgba(255,255,255,0.4);
    transform: rotate(180deg);
}

/* Tabs */
.kitchen-tabs {
    background: white;
    padding: 0 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 65px;
    z-index: 99;
    overflow-x: auto;
    white-space: nowrap;
}

.tabs-container {
    max-width: 1400px;
    margin: 0 auto;
    display: inline-flex;
    gap: 10px;
    padding: 12px 0;
}

.tab-btn {
    padding: 10px 24px;
    background: #f0f2f5;
    border: none;
    border-radius: 30px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 13px;
}

.tab-btn:hover {
    background: #e0e0e0;
    transform: translateY(-2px);
}

.tab-btn.active {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
}

/* Layout */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
    margin-bottom: 24px;
}

.stat-card {
    background: white;
    padding: 18px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.stat-number {
    font-size: 1.8rem;
    font-weight: bold;
    color: #27ae60;
}

.stat-label {
    color: #666;
    margin-top: 5px;
    font-size: 0.75rem;
}

/* Card */
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
    font-size: 1.1rem;
    margin-bottom: 18px;
    color: #1e5c3c;
    border-left: 4px solid #27ae60;
    padding-left: 12px;
}

/* Filters */
.filters {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
}

.filters input {
    padding: 10px 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    background: white;
    flex: 1;
    min-width: 220px;
}

.filters button {
    background: #3498db;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 800;
    transition: all 0.3s;
    font-size: 13px;
}

.filters button:hover {
    background: #2980b9;
    transform: translateY(-2px);
}

.filters .btn-clear {
    background: #e74c3c;
}

.filters .btn-clear:hover {
    background: #c0392b;
}

.export-buttons {
    display: flex;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
}

.export-buttons button {
    background: #27ae60;
    padding: 10px 14px;
    font-size: 12px;
}

.export-buttons button:hover {
    background: #1e8c4f;
}

/* Orders */
.order-group {
    margin-bottom: 25px;
    border: 1px solid #eef2ff;
    border-radius: 12px;
    overflow: hidden;
}

.order-header {
    background: #f8fafc;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid #eef2ff;
}

.order-id {
    font-weight: bold;
    font-size: 0.85rem;
    color: #1e5c3c;
    font-family: monospace;
}

.order-meta {
    display: flex;
    gap: 20px;
    font-size: 0.75rem;
    color: #666;
    flex-wrap: wrap;
}

.kitchen-tag {
    background: #e8f5e9;
    color: #27ae60;
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 0.7rem;
    font-weight: 800;
    margin-left: 10px;
}

.order-total {
    background: #fff3cd;
    padding: 8px 15px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.8rem;
    color: #856404;
}

.empty-state {
    text-align: center;
    padding: 50px;
    background: white;
    border-radius: 16px;
    color: #999;
}

/* Table */
.table-wrapper {
    overflow-x: auto;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.data-table th {
    text-align: left;
    padding: 12px 10px;
    font-weight: 800;
    color: #475569;
    background: #f8fafc;
    border-bottom: 2px solid #e2e8f0;
}

.data-table td {
    padding: 12px 10px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
}

.data-table tbody tr:nth-child(even) {
    background: #f9fafb;
}

.data-table tbody tr:hover {
    background: #e8f5e9;
    transition: 0.2s;
}

/* Badge */
.badge {
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 900;
    display: inline-block;
}

.badge-approved {
    background: #dcfce7;
    color: #166534;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 1000;
    animation: fadeIn 0.3s;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Modal */
.modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    max-width: 360px;
    width: 90%;
}

.modal-content h2 {
    margin-bottom: 15px;
    color: #1a1a2e;
}

.modal-content p {
    color: #666;
    margin-bottom: 20px;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    text-align: center;
}

.modal-content button {
    background: #3498db;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
}

.error-msg {
    color: #e74c3c;
    margin-top: 12px;
    font-size: 0.85rem;
}

.close-modal {
    background: #95a5a6;
    margin-top: 10px;
}

.close-modal:hover {
    background: #7f8c8d;
}

/* Print */
@media print {
    body {
        background: white;
    }

    .header, .kitchen-tabs, .filters, .refresh-btn, .btn-header {
        display: none !important;
    }

    .card {
        box-shadow: none;
        border: 1px solid #ccc;
    }

    .order-group {
        page-break-inside: avoid;
    }
}

/* Mobile */
@media (max-width: 768px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }

    .stat-card {
        padding: 12px;
    }

    .stat-number {
        font-size: 1.2rem;
    }

    .container {
        padding: 15px;
    }

    .filters {
        flex-direction: column;
        align-items: stretch;
    }

    .filters input, .filters button {
        width: 100%;
    }

    .export-buttons {
        margin-left: 0;
        width: 100%;
    }

    .export-buttons button {
        flex: 1;
    }

    .data-table th, .data-table td {
        padding: 8px 6px;
        font-size: 11px;
    }

    .order-header {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
</head>

<body>

<!-- Password Modal -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Storekeeper Access</h2>
        <p>Enter password to continue</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="checkPassword()">Login</button>
        <div id="passwordError" class="error-msg"></div>
        <button class="close-modal" onclick="closePasswordModal()">← Back to Home</button>
    </div>
</div>

<!-- Main Content -->
<div id="mainContent" style="display: none;">
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span>Storekeeper <span>| Approved Orders</span></span>
            </div>
            <div class="header-buttons">
                <button class="refresh-btn" onclick="manualRefresh()" title="Refresh Data">🔄</button>
                <button class="btn-header" onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>

    <div class="kitchen-tabs">
        <div class="tabs-container" id="tabsContainer"></div>
    </div>

    <div id="kitchenPagesContainer"></div>
</div>

<script>
const STOREKEEPER_PASSWORD = "store123";

let currentKitchen = "all";
let allApprovedOrders = [];

let filterState = {
    search: "",
    dateFrom: "",
    dateTo: ""
};

/* Back */
function closePasswordModal() {
    window.location.href = "index.html";
}

/* Password Check */
function checkPassword() {
    if(document.getElementById("passwordInput").value === STOREKEEPER_PASSWORD) {
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        startRealtimeListener();
        showToast("✅ Login successful");
    } else {
        document.getElementById("passwordError").innerHTML = "Wrong password!";
    }
}

/* Manual Refresh */
function manualRefresh() {
    showToast("🔄 Refreshing...");
    loadApprovedOrdersOnce();
}

/* Date Format */
function formatDate(dateValue) {
    if(!dateValue) return "N/A";

    let d;

    if(typeof dateValue === "string") {
        d = new Date(dateValue);
    } else if(dateValue.seconds) {
        d = new Date(dateValue.seconds * 1000);
    } else {
        d = new Date(dateValue);
    }

    return d.toLocaleString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

/* Real-time Listener */
function startRealtimeListener() {
    db.collection("kitchen_requests").onSnapshot(snapshot => {
        allApprovedOrders = [];

        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.items && data.items.some(item => item.status === "approved")) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });

        renderTabs();
        renderCurrentKitchen();

    }, error => {
        console.error("Realtime error:", error);
        showToast("❌ Firestore error");
    });
}

/* One Time Load */
async function loadApprovedOrdersOnce() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allApprovedOrders = [];

        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.items && data.items.some(item => item.status === "approved")) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });

        renderTabs();
        renderCurrentKitchen();

    } catch(err) {
        console.error(err);
        showToast("❌ Error loading data");
    }
}

/* Tabs */
function renderTabs() {
    const kitchens = ["all", "Hot Kitchen", "Cold Kitchen", "Pastry / Bakery", "Butchery", "Beach House", "Nihon Kitchen", "Staff Kitchen"];
    const icons = {"all":"📋", "Hot Kitchen":"🔥", "Cold Kitchen":"❄️", "Pastry / Bakery":"🍰", "Butchery":"🥩", "Beach House":"🏖️", "Nihon Kitchen":"🍜", "Staff Kitchen":"👥"};
    const names = {"all":"All", "Hot Kitchen":"Hot", "Cold Kitchen":"Cold", "Pastry / Bakery":"Pastry", "Butchery":"Butchery", "Beach House":"Beach", "Nihon Kitchen":"Nihon", "Staff Kitchen":"Staff"};

    const container = document.getElementById("tabsContainer");
    container.innerHTML = "";

    kitchens.forEach(k => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${currentKitchen === k ? 'active' : ''}`;
        btn.innerHTML = `${icons[k]} ${names[k]}`;
        btn.onclick = () => selectKitchen(k);
        container.appendChild(btn);
    });
}

function selectKitchen(kitchen) {
    currentKitchen = kitchen;
    renderTabs();
    renderCurrentKitchen();
}

/* Save Filters */
function saveFiltersAndRender() {
    filterState.search = document.getElementById("searchInput").value;
    filterState.dateFrom = document.getElementById("dateFrom").value;
    filterState.dateTo = document.getElementById("dateTo").value;

    displayOrders();
}

/* Render Kitchen */
function renderCurrentKitchen() {
    let orders;

    if(currentKitchen === "all") {
        orders = allApprovedOrders;
    } else {
        orders = allApprovedOrders.filter(o => o.section === currentKitchen);
    }

    renderKitchenPage(currentKitchen, orders);
}

/* Page */
function renderKitchenPage(kitchen, orders) {
    const container = document.getElementById("kitchenPagesContainer");

    let totalOrders = orders.length;
    let totalItems = 0;
    let totalQuantity = 0;
    let totalValue = 0;
    const uniqueItems = new Set();

    orders.forEach(order => {
        totalItems += order.items.length;

        order.items.forEach(item => {
            if(item.status === "approved") {
                const qty = item.approvedQty || item.originalQty || 0;
                const price = item.price || 0;

                totalQuantity += qty;
                totalValue += qty * price;
                uniqueItems.add(item.name);
            }
        });
    });

    container.innerHTML = `
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalOrders}</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-number">${totalItems}</div><div class="stat-label">Items</div></div>
                <div class="stat-card"><div class="stat-number">${totalQuantity.toFixed(1)}</div><div class="stat-label">Total Qty</div></div>
                <div class="stat-card"><div class="stat-number">${uniqueItems.size}</div><div class="stat-label">Unique Items</div></div>
                <div class="stat-card"><div class="stat-number">${totalValue.toFixed(2)}</div><div class="stat-label">💰 Total Value (EGP)</div></div>
            </div>

            <div class="card">
                <h3>📋 ${kitchen === "all" ? "All Kitchens" : kitchen} - Approved Orders</h3>

                <div class="filters">
                    <input type="text" id="searchInput" placeholder="🔍 Search item / code / chef / request ID" oninput="saveFiltersAndRender()">
                    <input type="date" id="dateFrom" onchange="saveFiltersAndRender()">
                    <input type="date" id="dateTo" onchange="saveFiltersAndRender()">

                    <div class="export-buttons">
                        <button onclick="exportByKitchen()">📎 Export Kitchen</button>
                        <button onclick="exportByDay()">📅 Export Day</button>
                        <button onclick="exportAllData()">📊 Export All</button>
                    </div>

                    <button onclick="displayOrders()">🔍 Filter</button>
                    <button class="btn-clear" onclick="clearFilters()">🗑️ Clear</button>
                </div>

                <div id="ordersList"></div>
            </div>
        </div>
    `;

    document.getElementById("searchInput").value = filterState.search;
    document.getElementById("dateFrom").value = filterState.dateFrom;
    document.getElementById("dateTo").value = filterState.dateTo;

    displayOrders();
}

/* Clear Filters */
function clearFilters() {
    filterState.search = "";
    filterState.dateFrom = "";
    filterState.dateTo = "";

    document.getElementById("searchInput").value = "";
    document.getElementById("dateFrom").value = "";
    document.getElementById("dateTo").value = "";

    displayOrders();
}

/* Filtering */
function getFilteredOrders() {
    let filtered = [...allApprovedOrders];

    if(currentKitchen !== "all") {
        filtered = filtered.filter(o => o.section === currentKitchen);
    }

    if(filterState.dateFrom) {
        const fromDate = new Date(filterState.dateFrom);
        fromDate.setHours(0,0,0,0);

        filtered = filtered.filter(o => {
            const orderDate = new Date(o.submittedAt?.seconds ? o.submittedAt.seconds * 1000 : o.submittedAt);
            return orderDate >= fromDate;
        });
    }

    if(filterState.dateTo) {
        const toDate = new Date(filterState.dateTo);
        toDate.setHours(23,59,59,999);

        filtered = filtered.filter(o => {
            const orderDate = new Date(o.submittedAt?.seconds ? o.submittedAt.seconds * 1000 : o.submittedAt);
            return orderDate <= toDate;
        });
    }

    if(filterState.search.trim() !== "") {
        const search = filterState.search.toLowerCase();

        filtered = filtered.filter(order => {
            if(order.requestId?.toLowerCase().includes(search)) return true;
            if(order.chefName?.toLowerCase().includes(search)) return true;
            if(order.section?.toLowerCase().includes(search)) return true;

            return order.items.some(item =>
                item.name?.toLowerCase().includes(search) ||
                item.code?.toString().includes(search)
            );
        });
    }

    return filtered;
}

/* Display Orders */
function displayOrders() {
    const container = document.getElementById("ordersList");
    let filtered = getFilteredOrders();

    filtered = filtered.filter(order => order.items.some(item => item.status === "approved"));

    filtered.sort((a,b) => {
        const da = new Date(a.submittedAt?.seconds ? a.submittedAt.seconds * 1000 : a.submittedAt);
        const dbb = new Date(b.submittedAt?.seconds ? b.submittedAt.seconds * 1000 : b.submittedAt);
        return dbb - da;
    });

    if(filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No approved orders found</div>';
        return;
    }

    let html = "";

    filtered.forEach(order => {
        const approvedItems = order.items.filter(item => item.status === "approved");
        if(approvedItems.length === 0) return;

        let orderTotalValue = 0;

        html += `
        <div class="order-group">
            <div class="order-header">
                <div>
                    <span class="order-id">📄 ${order.requestId || order.id}</span>
                    <span class="kitchen-tag">${order.section || "Unknown"}</span>
                </div>
                <div class="order-meta">
                    <span>👨‍🍳 ${order.chefName || "Unknown"}</span>
                    <span>📅 ${formatDate(order.submittedAt)}</span>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Item Name</th>
                            <th>Qty</th>
                            <th>Unit</th>
                            <th>Price (EGP)</th>
                            <th>Total (EGP)</th>
                            <th>Approved By</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const total = qty * price;
            orderTotalValue += total;

            const approvedBy = item.approvedBy || "N/A";

            html += `
            <tr>
                <td>${item.code || ""}</td>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td>${Number(qty).toFixed(1)}</td>
                <td>${item.unit || ""}</td>
                <td>${Number(price).toFixed(2)}</td>
                <td>${Number(total).toFixed(2)}</td>
                <td><span class="badge badge-approved">✔ ${escapeHtml(approvedBy)}</span></td>
            </tr>
            `;
        });

        html += `
                    </tbody>
                </table>
            </div>

            <div style="padding: 10px 15px; background: #f0fdf4; text-align: right; border-top: 1px solid #eef2ff;">
                <span class="order-total">💰 Order Total: ${orderTotalValue.toFixed(2)} EGP</span>
            </div>
        </div>
        `;
    });

    container.innerHTML = html;
}

/* Export Kitchen */
function exportByKitchen() {
    let filtered = getFilteredOrders();
    filtered = filtered.filter(order => order.items.some(item => item.status === "approved"));

    if(filtered.length === 0) { showToast("No data to export"); return; }

    const kitchenName = currentKitchen === "all" ? "All_Kitchens" : currentKitchen.replace(/ /g, "_");

    let csv = "Request ID,Kitchen,Chef,Date,Code,Item Name,Approved Qty,Unit,Price (EGP),Total Value (EGP),Approved By\n";
    let grandTotal = 0;

    filtered.forEach(order => {
        order.items.forEach(item => {
            if(item.status === "approved") {
                const qty = item.approvedQty || item.originalQty || 0;
                const price = item.price || 0;
                const total = qty * price;
                grandTotal += total;

                csv += `"${order.requestId}","${order.section}","${order.chefName}","${formatDate(order.submittedAt)}","${item.code}","${item.name}",${Number(qty).toFixed(1)},"${item.unit}",${Number(price).toFixed(2)},${Number(total).toFixed(2)},"${item.approvedBy || ''}"\n`;
            }
        });
    });

    csv += `\n"GRAND TOTAL",,,,,,,,,"${grandTotal.toFixed(2)} EGP",\n`;

    downloadCSV(csv, `approved_orders_${kitchenName}_${new Date().toISOString().slice(0,19)}.csv`);
    showToast("📎 Exported by Kitchen");
}

/* Export By Day */
function exportByDay() {
    let filtered = getFilteredOrders();
    filtered = filtered.filter(order => order.items.some(item => item.status === "approved"));

    if(filtered.length === 0) { showToast("No data to export"); return; }

    const ordersByDate = {};

    filtered.forEach(order => {
        const date = formatDate(order.submittedAt).split(",")[0];
        if(!ordersByDate[date]) ordersByDate[date] = [];
        ordersByDate[date].push(order);
    });

    let csv = "Date,Request ID,Kitchen,Chef,Code,Item Name,Approved Qty,Unit,Price (EGP),Total Value (EGP),Approved By\n";
    let overallGrandTotal = 0;

    for(const [date, orders] of Object.entries(ordersByDate)) {
        let dayTotal = 0;

        orders.forEach(order => {
            order.items.forEach(item => {
                if(item.status === "approved") {
                    const qty = item.approvedQty || item.originalQty || 0;
                    const price = item.price || 0;
                    const total = qty * price;

                    dayTotal += total;
                    overallGrandTotal += total;

                    csv += `"${date}","${order.requestId}","${order.section}","${order.chefName}","${item.code}","${item.name}",${Number(qty).toFixed(1)},"${item.unit}",${Number(price).toFixed(2)},${Number(total).toFixed(2)},"${item.approvedBy || ''}"\n`;
                }
            });
        });

        csv += `"DAY TOTAL: ${date}",,,,,,,,,"${dayTotal.toFixed(2)} EGP",\n`;
    }

    csv += `\n"OVERALL GRAND TOTAL",,,,,,,,,"${overallGrandTotal.toFixed(2)} EGP",\n`;

    downloadCSV(csv, `approved_orders_by_day_${new Date().toISOString().slice(0,19)}.csv`);
    showToast("📅 Exported by Day");
}

/* CSV Download */
function downloadCSV(csvText, filename) {
    const blob = new Blob(["\uFEFF" + csvText], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

/* Escape HTML */
function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

/* Toast */
function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

/* On Load */
window.onload = () => {
    document.getElementById("passwordModal").style.display = "flex";
};
