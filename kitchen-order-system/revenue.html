<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Restaurant Analytics Pro | Live Dashboard</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f0f2f8;
      font-family: 'Inter', sans-serif;
      padding: 20px 18px 50px 18px;
      color: #121826;
    }

    /* premium container */
    .dashboard {
      max-width: 1280px;
      margin: 0 auto;
    }

    /* glass header */
    .header-pro {
      background: linear-gradient(135deg, #0B2B40 0%, #144E6E 100%);
      border-radius: 36px;
      padding: 28px 28px;
      margin-bottom: 28px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .header-pro::before {
      content: '';
      position: absolute;
      top: -30%;
      right: -10%;
      width: 280px;
      height: 280px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      pointer-events: none;
    }
    .header-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    .logo-area h1 {
      color: white;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      color: #b8d8fc;
      font-size: 0.8rem;
      margin-top: 6px;
    }
    .live-clock {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      padding: 8px 20px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: white;
      font-family: monospace;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* metrics grid - pro cards */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .metric-card {
      background: white;
      border-radius: 28px;
      padding: 20px 18px;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.04);
    }
    .metric-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
    }
    .metric-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #617b9b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .metric-number {
      font-size: 2.3rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .trend-badge {
      font-size: 0.7rem;
      background: #eef2fa;
      display: inline-block;
      padding: 4px 10px;
      border-radius: 30px;
      margin-top: 8px;
    }

    /* two columns */
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .glass-panel {
      background: white;
      border-radius: 32px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.03);
      border: 1px solid #eef2f9;
      transition: all 0.2s;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      font-weight: 700;
      font-size: 1.25rem;
      border-left: 4px solid #1f6e8c;
      padding-left: 14px;
    }
    .input-pro {
      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      border: 1.5px solid #e2ecf5;
      font-size: 0.9rem;
      transition: 0.2s;
      background: #ffffff;
    }
    .input-pro:focus {
      border-color: #1f6e8c;
      outline: none;
      box-shadow: 0 0 0 3px rgba(31,110,140,0.1);
    }
    .btn-pro {
      background: #144E6E;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 34px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-pro:active { transform: scale(0.97); background: #0c3a52; }

    /* chart container */
    .chart-wrapper {
      height: 280px;
      margin-top: 8px;
    }

    /* reports list — premium card style */
    .reports-section {
      background: white;
      border-radius: 32px;
      padding: 0px;
      overflow: hidden;
      border: 1px solid #eef2f9;
    }
    .reports-header {
      padding: 22px 24px 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #eef2fa;
    }
    .report-feed {
      max-height: 460px;
      overflow-y: auto;
    }
    .report-entry {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f4fa;
      transition: background 0.2s;
    }
    .report-entry:last-child { border-bottom: none; }
    .report-row-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .resto-name {
      font-weight: 800;
      font-size: 1.1rem;
      background: #eef3fc;
      padding: 6px 18px;
      border-radius: 40px;
      color: #1a5777;
    }
    .timestamp {
      font-size: 0.7rem;
      color: #809ab3;
      font-family: monospace;
    }
    .stats-badge {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin: 12px 0 8px;
    }
    .stat-chip {
      background: #f8fafd;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .notes-field {
      background: #Fef9e6;
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #8a6e2d;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 3px solid #e6b451;
    }
    .empty-pro {
      text-align: center;
      padding: 60px 24px;
      color: #9ab3cc;
    }

    /* alert styles */
    .alert-pro {
      background: #144E6E;
      color: white;
      border-radius: 60px;
      padding: 12px 20px;
      margin-bottom: 20px;
      font-weight: 500;
      font-size: 0.85rem;
      text-align: center;
      animation: slideDown 0.2s ease;
    }
    .alert-error {
      background: #c0442c;
    }
    .alert-success {
      background: #2b7a4b;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 850px) {
      .kpi-row {
        grid-template-columns: repeat(2,1fr);
        gap: 14px;
      }
      .grid-2col {
        grid-template-columns: 1fr;
        gap: 22px;
      }
      body {
        padding: 16px;
      }
      .metric-number {
        font-size: 1.8rem;
      }
    }
    @media (max-width: 500px) {
      .resto-name { font-size: 0.9rem; }
      .stat-chip { font-size: 0.7rem; }
    }
    i { color: #5486a6; margin-right: 4px; }
  </style>
</head>
<body>
<div class="dashboard">
  <!-- Header Pro -->
  <div class="header-pro">
    <div class="header-flex">
      <div class="logo-area">
        <h1><i class="fas fa-chart-line"></i> RESTRO PRO</h1>
        <p>Intelligent revenue & covers · Live Firestore</p>
      </div>
      <div class="live-clock" id="liveTimestamp">--:-- --</div>
    </div>
  </div>

  <div id="alertContainer"></div>

  <!-- KPI CARDS elevated -->
  <div class="kpi-row">
    <div class="metric-card"><div class="metric-title"><i class="fas fa-coins"></i> TOTAL REVENUE</div><div class="metric-number" id="totalRevenueVal">0 EGP</div><div class="trend-badge">Today's performance</div></div>
    <div class="metric-card"><div class="metric-title"><i class="fas fa-users"></i> TOTAL COVERS</div><div class="metric-number" id="totalCoversVal">0</div><div class="trend-badge">guests served</div></div>
    <div class="metric-card"><div class="metric-title"><i class="fas fa-receipt"></i> AVG SPEND</div><div class="metric-number" id="avgSpendVal">0 EGP</div><div class="trend-badge">per cover</div></div>
    <div class="metric-card"><div class="metric-title"><i class="fas fa-trophy"></i> TOP SPOT</div><div class="metric-number" id="bestRestVal">—</div><div class="trend-badge">highest revenue</div></div>
  </div>

  <!-- ENTRY + CHART -->
  <div class="grid-2col">
    <!-- left: premium form -->
    <div class="glass-panel">
      <div class="panel-header"><i class="fas fa-pen-alt"></i> Daily Report Entry</div>
      <div class="input-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size:0.8rem;">🏛️ Restaurant</label>
        <select id="restaurantSelect" class="input-pro">
          <option value="" disabled selected>— Select establishment —</option>
          <option value="The Restaurant">The Restaurant</option>
          <option value="The Beach House">The Beach House</option>
          <option value="Nihon">Nihon</option>
        </select>
      </div>
      <div class="input-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size:0.8rem;">👥 Covers (guests)</label>
        <input type="number" id="coversInput" class="input-pro" placeholder="e.g., 124">
      </div>
      <div class="input-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size:0.8rem;">💰 Revenue (EGP)</label>
        <input type="number" id="revenueInput" class="input-pro" placeholder="e.g., 48200">
      </div>
      <div class="input-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600; font-size:0.8rem;">👨‍💼 Manager</label>
        <input type="text" id="managerInput" class="input-pro" placeholder="Full name">
      </div>
      <div class="input-group" style="margin-bottom: 12px;">
        <label style="font-weight: 600; font-size:0.8rem;"><i class="fas fa-sticky-note"></i> Notes (optional)</label>
        <textarea id="notesInput" rows="2" class="input-pro" placeholder="Special events, feedback, issues..."></textarea>
      </div>
      <button class="btn-pro" id="saveReportBtn"><i class="fas fa-cloud-upload-alt"></i> Save Report • Auto Timestamp</button>
    </div>

    <!-- right: chart pro -->
    <div class="glass-panel">
      <div class="panel-header"><i class="fas fa-chart-bar"></i> Today's Revenue by Restaurant</div>
      <div class="chart-wrapper">
        <canvas id="revenueChartCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- REPORTS timeline premium -->
  <div class="reports-section">
    <div class="reports-header">
      <span style="font-weight: 800; font-size: 1.2rem;"><i class="fas fa-history"></i> Today's Reports</span>
      <span style="font-size: 0.7rem; background: #eef2fa; padding: 4px 12px; border-radius: 50px;"><i class="far fa-clock"></i> newest first</span>
    </div>
    <div class="report-feed" id="reportsListContainer">
      <div class="empty-pro"><i class="fas fa-spinner fa-pulse"></i> Loading premium insights...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyDz8wXx14B16B5sRzJ20qPQb6K4fNetHrE",
    authDomain: "restaurant-analytics-27bd8.firebaseapp.com",
    databaseURL: "https://restaurant-analytics-27bd8-default-rtdb.firebaseio.com",
    projectId: "restaurant-analytics-27bd8",
    storageBucket: "restaurant-analytics-27bd8.firebasestorage.app",
    messagingSenderId: "280901089364",
    appId: "1:280901089364:web:26958c4c5334092194d5c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // DOM
  const restaurantSelect = document.getElementById("restaurantSelect");
  const coversInput = document.getElementById("coversInput");
  const revenueInput = document.getElementById("revenueInput");
  const managerInput = document.getElementById("managerInput");
  const notesInput = document.getElementById("notesInput");
  const saveBtn = document.getElementById("saveReportBtn");
  const totalRevenueSpan = document.getElementById("totalRevenueVal");
  const totalCoversSpan = document.getElementById("totalCoversVal");
  const avgSpendSpan = document.getElementById("avgSpendVal");
  const bestRestSpan = document.getElementById("bestRestVal");
  const reportsContainer = document.getElementById("reportsListContainer");

  let revenueChart;
  const chartCtx = document.getElementById("revenueChartCanvas").getContext("2d");

  // Helper messages
  function showMessage(text, isError = false) {
    const alertDiv = document.getElementById("alertContainer");
    const typeClass = isError ? "alert-error" : "alert-success";
    alertDiv.innerHTML = `<div class="alert-pro ${typeClass}"><i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${text}</div>`;
    setTimeout(() => { if(alertDiv.firstChild) alertDiv.innerHTML = ""; }, 3200);
  }

  function formatTimeFromTimestamp(timestamp) {
    if (!timestamp) return "just now";
    try {
      const date = timestamp.toDate();
      return date.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
    } catch(e) { return "recent"; }
  }

  function updateLiveClock() {
    const now = new Date();
    const formatted = `${now.toLocaleDateString('en-GB')} • ${now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })}`;
    document.getElementById("liveTimestamp").innerText = formatted;
  }
  updateLiveClock();
  setInterval(updateLiveClock, 60000);

  const getTodayStr = () => new Date().toISOString().split('T')[0];
  let currentDate = getTodayStr();

  async function loadData() {
    try {
      const q = query(collection(db, "dailyReports"), where("date", "==", currentDate));
      const snapshot = await getDocs(q);
      
      let totalRevenue = 0;
      let totalCovers = 0;
      let revenueMap = {
        "The Restaurant": 0,
        "The Beach House": 0,
        "Nihon": 0
      };
      let reportsArray = [];
      
      snapshot.forEach(doc => {
        const data = doc.data();
        reportsArray.push(data);
        const rev = Number(data.revenue) || 0;
        const cov = Number(data.covers) || 0;
        totalRevenue += rev;
        totalCovers += cov;
        if (revenueMap.hasOwnProperty(data.restaurant)) {
          revenueMap[data.restaurant] += rev;
        }
      });
      
      // sort newest first (client side)
      reportsArray.sort((a,b) => {
        const timeA = a.createdAt?.toMillis?.() || 0;
        const timeB = b.createdAt?.toMillis?.() || 0;
        return timeB - timeA;
      });
      
      // build premium timeline
      if (reportsArray.length === 0) {
        reportsContainer.innerHTML = `<div class="empty-pro"><i class="fas fa-receipt"></i> No reports yet. Add today's data ✨</div>`;
      } else {
        let html = "";
        reportsArray.forEach(r => {
          const rest = r.restaurant;
          const rev = Number(r.revenue);
          const cov = Number(r.covers);
          const manager = r.manager || "—";
          const notes = r.notes || "";
          const timeStr = r.createdAt ? formatTimeFromTimestamp(r.createdAt) : "today";
          // premium card design
          html += `
            <div class="report-entry">
              <div class="report-row-main">
                <span class="resto-name"><i class="fas fa-store"></i> ${escapeHtml(rest)}</span>
                <span class="timestamp"><i class="far fa-clock"></i> ${escapeHtml(timeStr)}</span>
              </div>
              <div class="stats-badge">
                <span class="stat-chip"><i class="fas fa-chair"></i> ${cov.toLocaleString()} covers</span>
                <span class="stat-chip"><i class="fas fa-money-bill-wave"></i> ${rev.toLocaleString()} EGP</span>
                <span class="stat-chip"><i class="fas fa-user-tie"></i> ${escapeHtml(manager)}</span>
              </div>
              ${notes ? `<div class="notes-field"><i class="fas fa-pen-fancy"></i> <span>${escapeHtml(notes)}</span></div>` : ''}
            </div>
          `;
        });
        reportsContainer.innerHTML = html;
      }
      
      // update KPIs
      totalRevenueSpan.innerText = totalRevenue.toLocaleString() + " EGP";
      totalCoversSpan.innerText = totalCovers.toLocaleString();
      const avg = totalCovers > 0 ? (totalRevenue / totalCovers).toFixed(2) : 0;
      avgSpendSpan.innerText = avg.toLocaleString() + " EGP";
      
      let best = "—";
      let maxRev = 0;
      for (let [r, val] of Object.entries(revenueMap)) {
        if (val > maxRev) { maxRev = val; best = r; }
      }
      bestRestSpan.innerText = best === "—" ? "—" : best;
      
      // update chart
      if (revenueChart) {
        revenueChart.data.datasets[0].data = [
          revenueMap["The Restaurant"] || 0,
          revenueMap["The Beach House"] || 0,
          revenueMap["Nihon"] || 0
        ];
        revenueChart.update();
      }
    } catch (error) {
      console.error(error);
      showMessage("Firebase load error: check rules & index (allow read/write)", true);
      reportsContainer.innerHTML = `<div class="empty-pro"><i class="fas fa-database"></i> Unable to fetch reports. Check Firestore permissions.</div>`;
    }
  }

  async function saveReport() {
    const selectedRest = restaurantSelect.value;
    if (!selectedRest || selectedRest === "") {
      showMessage("Please select a restaurant", true);
      return;
    }
    const covers = parseInt(coversInput.value);
    const revenue = parseInt(revenueInput.value);
    const manager = managerInput.value.trim();
    
    if (!covers || covers <= 0 || isNaN(covers)) { showMessage("Valid covers required", true); return; }
    if (!revenue || revenue <= 0 || isNaN(revenue)) { showMessage("Valid revenue required", true); return; }
    if (!manager || manager.length < 2) { showMessage("Manager name required", true); return; }
    
    const optionalNotes = notesInput.value.trim();
    
    try {
      await addDoc(collection(db, "dailyReports"), {
        restaurant: selectedRest,
        covers: covers,
        revenue: revenue,
        manager: manager,
        notes: optionalNotes,
        date: currentDate,
        createdAt: serverTimestamp()
      });
      showMessage(`✓ ${selectedRest} saved | ${revenue.toLocaleString()} EGP`, false);
      // reset
      restaurantSelect.value = "";
      coversInput.value = "";
      revenueInput.value = "";
      managerInput.value = "";
      notesInput.value = "";
      await loadData();
    } catch (err) {
      console.error(err);
      showMessage(`Save failed: ${err.message}. Update rules (allow read/write)`, true);
    }
  }

  function initChart() {
    revenueChart = new Chart(chartCtx, {
      type: 'bar',
      data: {
        labels: ['The Restaurant', 'The Beach House', 'Nihon'],
        datasets: [{
          label: 'Revenue (EGP)',
          data: [0, 0, 0],
          backgroundColor: ['#296e8f', '#399c6e', '#cb8b42'],
          borderRadius: 14,
          barPercentage: 0.65,
          categoryPercentage: 0.8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { position: 'top', labels: { font: { weight: '600', size: 11 } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} EGP` } }
        },
        scales: {
          y: { beginAtZero: true, grid: { color: '#eef2f5' }, ticks: { callback: (val) => val.toLocaleString() } },
          x: { ticks: { font: { weight: '500' } } }
        }
      }
    });
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  saveBtn.addEventListener("click", saveReport);
  initChart();
  loadData();
  document.addEventListener("visibilitychange", () => { if (!document.hidden) loadData(); });
</script>
</body>
</html>
