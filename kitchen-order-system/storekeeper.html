<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Storekeeper Dashboard - Final Approved Orders</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
    padding: 16px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.logo {
    font-size: 1.4rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    font-size: 1.8rem;
}

.logo span {
    color: #ffd700;
}

.header-buttons {
    display: flex;
    gap: 10px;
}

.btn-header {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 18px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-header:hover {
    background: rgba(255,255,255,0.3);
    transform: translateY(-2px);
}

/* Kitchen Tabs */
.kitchen-tabs {
    background: white;
    padding: 0 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 70px;
    z-index: 99;
    overflow-x: auto;
    white-space: nowrap;
}

.tabs-container {
    max-width: 1400px;
    margin: 0 auto;
    display: inline-flex;
    gap: 10px;
    padding: 12px 0;
}

.tab-btn {
    padding: 10px 24px;
    background: #f0f2f5;
    border: none;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.tab-btn:hover {
    background: #e0e0e0;
    transform: translateY(-2px);
}

.tab-btn.active {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
}

/* Container */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
}

.kitchen-page {
    display: none;
}

.kitchen-page.active-page {
    display: block;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 24px;
}

.stat-card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.stat-number {
    font-size: 2rem;
    font-weight: bold;
    color: #27ae60;
}

.stat-label {
    color: #666;
    margin-top: 5px;
    font-size: 0.85rem;
}

/* Card */
.card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
    font-size: 1.2rem;
    margin-bottom: 18px;
    color: #1e5c3c;
    border-left: 4px solid #27ae60;
    padding-left: 12px;
}

/* Filters */
.filters {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
}

.filters select, .filters input {
    padding: 10px 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    background: white;
}

.filters button {
    background: #3498db;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.filters button:hover {
    background: #2980b9;
    transform: translateY(-2px);
}

/* Orders List - Each item separate */
.orders-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.order-card {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 16px;
    border-left: 4px solid #27ae60;
}

.order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e0e0e0;
}

.order-id {
    font-weight: bold;
    font-size: 0.9rem;
}

.order-date {
    font-size: 0.75rem;
    color: #888;
}

.order-info {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px;
    background: white;
    border-radius: 10px;
}

.info-item {
    display: flex;
    flex-direction: column;
}

.info-label {
    font-size: 0.65rem;
    color: #888;
    text-transform: uppercase;
}

.info-value {
    font-weight: 600;
    margin-top: 3px;
    font-size: 0.85rem;
}

.items-list {
    margin-top: 12px;
}

.item-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px dashed #e0e0e0;
}

.item-row:last-child {
    border-bottom: none;
}

.item-name {
    font-weight: 500;
    font-size: 0.85rem;
}

.item-qty {
    background: #27ae60;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
}

.empty-state {
    text-align: center;
    padding: 60px;
    background: white;
    border-radius: 16px;
    color: #999;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    z-index: 1000;
}

/* Password Modal */
.modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    max-width: 400px;
    width: 90%;
}

.modal-content h2 {
    margin-bottom: 15px;
    color: #1a1a2e;
}

.modal-content p {
    color: #666;
    margin-bottom: 20px;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
}

.modal-content button {
    background: #3498db;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
    transition: all 0.3s;
}

.modal-content button:hover {
    background: #2980b9;
    transform: scale(1.02);
}

.error-msg {
    color: #e74c3c;
    margin-top: 12px;
    font-size: 0.85rem;
}

.close-modal {
    background: #95a5a6;
    margin-top: 10px;
}

.close-modal:hover {
    background: #7f8c8d;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .header {
        padding: 12px 16px;
    }
    
    .logo {
        font-size: 1.1rem;
    }
    
    .logo-icon {
        font-size: 1.3rem;
    }
    
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
    
    .stat-card {
        padding: 12px;
    }
    
    .stat-number {
        font-size: 1.5rem;
    }
    
    .container {
        padding: 16px;
    }
    
    .card {
        padding: 16px;
    }
    
    .card h3 {
        font-size: 1rem;
    }
    
    .kitchen-tabs {
        padding: 0 16px;
        top: 60px;
    }
    
    .tab-btn {
        padding: 8px 16px;
        font-size: 12px;
    }
    
    .filters {
        flex-direction: column;
    }
    
    .filters select, .filters input, .filters button {
        width: 100%;
    }
    
    .order-info {
        grid-template-columns: 1fr;
        gap: 8px;
    }
    
    .item-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
    }
    
    .item-qty {
        align-self: flex-start;
    }
}

@media (min-width: 769px) and (max-width: 1024px) {
    .stats-grid {
        gap: 15px;
    }
}
</style>
</head>
<body>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Storekeeper Access</h2>
        <p>Enter password to continue</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="checkPassword()">Login</button>
        <div id="passwordError" class="error-msg"></div>
        <button class="close-modal" onclick="closePasswordModal()">← Go Back</button>
    </div>
</div>

<div id="mainContent" style="display: none;">
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span>Storekeeper <span>| Approved Orders</span></span>
            </div>
            <div class="header-buttons">
                <button class="btn-header" onclick="exportAllToExcel()">📎 Export Excel</button>
                <button class="btn-header" onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>

    <div class="kitchen-tabs">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="selectKitchen('all')">📋 All Kitchens</button>
            <button class="tab-btn" onclick="selectKitchen('Hot Kitchen')">🔥 Hot</button>
            <button class="tab-btn" onclick="selectKitchen('Cold Kitchen')">❄️ Cold</button>
            <button class="tab-btn" onclick="selectKitchen('Pastry')">🍰 Pastry</button>
            <button class="tab-btn" onclick="selectKitchen('Butchery')">🥩 Butchery</button>
            <button class="tab-btn" onclick="selectKitchen('Beach House')">🏖️ Beach</button>
            <button class="tab-btn" onclick="selectKitchen('Nihon Kitchen')">🍜 Nihon</button>
            <button class="tab-btn" onclick="selectKitchen('Staff Kitchen')">👥 Staff</button>
        </div>
    </div>

    <div id="kitchenPagesContainer"></div>
</div>

<script>
const STOREKEEPER_PASSWORD = "store123";
let currentKitchen = "all";
let allApprovedOrders = [];

function closePasswordModal() {
    document.getElementById("passwordModal").style.display = "none";
    window.location.href = "index.html";
}

function checkPassword() {
    if(document.getElementById("passwordInput").value === STOREKEEPER_PASSWORD) {
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        loadApprovedOrders();
        setInterval(loadApprovedOrders, 5000);
    } else {
        document.getElementById("passwordError").innerHTML = "Wrong password!";
    }
}

async function loadApprovedOrders() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allApprovedOrders = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.items && data.items.every(item => item.status === "approved")) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });
        console.log("Loaded approved orders:", allApprovedOrders.length);
        renderCurrentKitchen();
    } catch (error) {
        console.error("Error:", error);
    }
}

function renderCurrentKitchen() {
    if(currentKitchen === "all") {
        renderKitchenPage("all", allApprovedOrders);
    } else {
        const filtered = allApprovedOrders.filter(o => o.section === currentKitchen);
        renderKitchenPage(currentKitchen, filtered);
    }
}

function renderKitchenPage(kitchen, orders) {
    const container = document.getElementById("kitchenPagesContainer");
    
    let totalOrders = orders.length;
    let totalItems = 0;
    let totalQuantity = 0;
    const uniqueItems = new Set();
    
    orders.forEach(order => {
        totalItems += order.items.length;
        order.items.forEach(item => {
            totalQuantity += item.approvedQty || item.originalQty;
            uniqueItems.add(item.name);
        });
    });
    
    let statsHtml = `
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalOrders}</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-number">${totalItems}</div><div class="stat-label">Items</div></div>
                <div class="stat-card"><div class="stat-number">${totalQuantity}</div><div class="stat-label">Quantity</div></div>
                <div class="stat-card"><div class="stat-number">${uniqueItems.size}</div><div class="stat-label">Unique</div></div>
            </div>
            <div class="card">
                <h3>📋 ${kitchen === "all" ? "All Kitchens" : kitchen} - Approved Orders</h3>
                <div class="filters">
                    <input type="date" id="dateFrom" placeholder="From Date">
                    <input type="date" id="dateTo" placeholder="To Date">
                    <button onclick="filterOrders()">🔄 Filter</button>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
    `;
    
    container.innerHTML = statsHtml;
    displayOrders(orders);
}

function displayOrders(orders) {
    const container = document.getElementById("ordersList");
    
    let dateFrom = document.getElementById("dateFrom")?.value;
    let dateTo = document.getElementById("dateTo")?.value;
    
    let filtered = [...orders];
    if(dateFrom) {
        filtered = filtered.filter(o => new Date(o.submittedAt) >= new Date(dateFrom));
    }
    if(dateTo) {
        const endDate = new Date(dateTo);
        endDate.setHours(23, 59, 59);
        filtered = filtered.filter(o => new Date(o.submittedAt) <= endDate);
    }
    
    filtered.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    
    if(filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No approved orders found</div>';
        return;
    }
    
    let ordersHtml = '<div class="orders-list">';
    
    filtered.forEach(order => {
        const totalQty = order.items.reduce((sum, item) => sum + (item.approvedQty || item.originalQty), 0);
        
        let itemsHtml = '<div class="items-list">';
        order.items.forEach(item => {
            const qty = item.approvedQty || item.originalQty;
            itemsHtml += `
                <div class="item-row">
                    <span class="item-name">${item.name} (${item.code})</span>
                    <span class="item-qty">${qty} ${item.unit}</span>
                </div>
            `;
        });
        itemsHtml += '</div>';
        
        ordersHtml += `
            <div class="order-card">
                <div class="order-header">
                    <span class="order-id">📄 ${order.requestId}</span>
                    <span class="order-date">📅 ${order.submittedAt}</span>
                </div>
                <div class="order-info">
                    <div class="info-item"><span class="info-label">🍽️ Kitchen</span><span class="info-value">${order.section}</span></div>
                    <div class="info-item"><span class="info-label">👨‍🍳 Chef</span><span class="info-value">${order.chefName}</span></div>
                    <div class="info-item"><span class="info-label">📦 Total Quantity</span><span class="info-value">${totalQty} units</span></div>
                </div>
                ${itemsHtml}
            </div>
        `;
    });
    
    ordersHtml += '</div>';
    container.innerHTML = ordersHtml;
}

function filterOrders() {
    renderCurrentKitchen();
}

function selectKitchen(kitchen) {
    currentKitchen = kitchen;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderCurrentKitchen();
}

function exportAllToExcel() {
    if(allApprovedOrders.length === 0) { alert("No data to export"); return; }
    
    let csv = "Request ID,Kitchen,Chef,Date,Item,Approved Qty,Unit\n";
    allApprovedOrders.forEach(order => {
        order.items.forEach(item => {
            csv += `"${order.requestId}","${order.section}","${order.chefName}","${order.submittedAt}","${item.name}",${item.approvedQty || item.originalQty},"${item.unit}"\n`;
        });
    });
    
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `approved_orders_${new Date().toISOString().slice(0,19)}.csv`;
    link.click();
    showToast("Exported");
}

function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

window.onload = () => { document.getElementById("passwordModal").style.display = "flex"; };
</script>
</body>
</html>
