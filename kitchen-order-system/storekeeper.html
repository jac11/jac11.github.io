<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Storekeeper Dashboard - Final Approved Orders</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }

.header { background: linear-gradient(135deg, #1e5c3c, #2a8a50); color: white; padding: 16px 24px; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.logo { font-size: 1.4rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 1.8rem; }
.logo span { color: #ffd700; }
.header-buttons { display: flex; gap: 10px; }
.btn-header { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 25px; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s; }
.btn-header:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
.btn-back { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 25px; color: white; cursor: pointer; transition: all 0.3s; }
.btn-back:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
.stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; }
.stat-number { font-size: 2rem; font-weight: bold; color: #27ae60; }
.stat-label { color: #666; margin-top: 5px; }

.card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h3 { font-size: 1.2rem; margin-bottom: 18px; color: #1e5c3c; border-left: 4px solid #27ae60; padding-left: 12px; display: flex; align-items: center; gap: 10px; }

.filters { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input { padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; }
.filters button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
.filters button:hover { background: #2980b9; transform: translateY(-2px); }

.orders-table { width: 100%; border-collapse: collapse; }
.orders-table th, .orders-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
.orders-table th { background: #f8f9fa; font-weight: 600; color: #555; }

.status-approved { color: #27ae60; font-weight: bold; }
.empty-state { text-align: center; padding: 60px; color: #999; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 30px; z-index: 1000; }

@media (max-width: 768px) {
    .container { padding: 16px; }
    .stats-grid { gap: 10px; }
    .stat-card { padding: 12px; }
    .stat-number { font-size: 1.5rem; }
    .orders-table { font-size: 0.8rem; }
    .filters { flex-direction: column; align-items: stretch; }
    .filters button { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo">
            <span class="logo-icon">📦</span>
            <span>Storekeeper Dashboard <span>| Final Approved Orders</span></span>
        </div>
        <div class="header-buttons">
            <button class="btn-header" onclick="exportToExcel()">📎 Export Excel</button>
            <button class="btn-header" onclick="window.print()">🖨️ Print</button>
            <button class="btn-back" onclick="window.location.href='index.html'">← Back</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Approved Orders</div></div>
        <div class="stat-card"><div class="stat-number" id="totalItems">0</div><div class="stat-label">Total Items</div></div>
        <div class="stat-card"><div class="stat-number" id="totalQuantity">0</div><div class="stat-label">Total Quantity</div></div>
        <div class="stat-card"><div class="stat-number" id="uniqueItems">0</div><div class="stat-label">Unique Items</div></div>
    </div>

    <div class="card">
        <h3>📋 Final Approved Orders (Ready for Pickup)</h3>
        <div class="filters">
            <select id="kitchenFilter">
                <option value="all">All Kitchens</option>
                <option value="Hot Kitchen">🔥 Hot Kitchen</option>
                <option value="Cold Kitchen">❄️ Cold Kitchen</option>
                <option value="Pastry">🍰 Pastry</option>
                <option value="Butchery">🥩 Butchery</option>
                <option value="Beach House">🏖️ Beach House</option>
                <option value="Nihon Kitchen">🍜 Nihon Kitchen</option>
                <option value="Staff Kitchen">👥 Staff Kitchen</option>
            </select>
            <input type="date" id="dateFrom" placeholder="From Date">
            <input type="date" id="dateTo" placeholder="To Date">
            <button onclick="refreshOrders()">🔄 Filter</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="orders-table">
                <thead>
                    <tr><th>Request ID</th><th>Kitchen</th><th>Chef</th><th>Date</th><th>Items</th><th>Total Qty</th></tr>
                </thead>
                <tbody id="ordersBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
let allApprovedOrders = [];

async function loadApprovedOrders() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allApprovedOrders = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.items && data.items.every(item => item.status === "approved")) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });
        refreshOrders();
        updateStats();
    } catch (error) {
        console.error("Error:", error);
        showToast("Error loading data");
    }
}

function updateStats() {
    let totalItems = 0;
    let totalQuantity = 0;
    const uniqueItems = new Set();
    
    allApprovedOrders.forEach(order => {
        totalItems += order.items.length;
        order.items.forEach(item => {
            totalQuantity += item.approvedQty || item.originalQty;
            uniqueItems.add(item.name);
        });
    });
    
    document.getElementById("totalOrders").innerText = allApprovedOrders.length;
    document.getElementById("totalItems").innerText = totalItems;
    document.getElementById("totalQuantity").innerText = totalQuantity;
    document.getElementById("uniqueItems").innerText = uniqueItems.size;
}

function refreshOrders() {
    let orders = [...allApprovedOrders];
    
    const kitchenFilter = document.getElementById("kitchenFilter").value;
    if(kitchenFilter !== "all") {
        orders = orders.filter(o => o.section === kitchenFilter);
    }
    
    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;
    
    if(dateFrom) {
        orders = orders.filter(o => new Date(o.submittedAt) >= new Date(dateFrom));
    }
    if(dateTo) {
        const endDate = new Date(dateTo);
        endDate.setHours(23, 59, 59);
        orders = orders.filter(o => new Date(o.submittedAt) <= endDate);
    }
    
    orders.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    renderOrders(orders);
}

function renderOrders(orders) {
    const tbody = document.getElementById("ordersBody");
    if(orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">No approved orders found</td></tr>';
        return;
    }
    
    tbody.innerHTML = "";
    orders.forEach(order => {
        const itemsList = order.items.map(item => `${item.name} (${item.approvedQty || item.originalQty} ${item.unit})`).join(", ");
        const totalQty = order.items.reduce((sum, item) => sum + (item.approvedQty || item.originalQty), 0);
        
        tbody.innerHTML += `
            <tr>
                <td><strong>${order.requestId}</strong></td>
                <td>${order.section}</td>
                <td>${order.chefName}</td>
                <td>${order.submittedAt}</td>
                <td style="font-size:0.85rem;">${itemsList.substring(0, 80)}${itemsList.length > 80 ? "..." : ""}</td>
                <td><strong>${totalQty}</strong></td>
            </tr>
        `;
    });
}

function exportToExcel() {
    if(allApprovedOrders.length === 0) { showToast("No data to export"); return; }
    
    let csv = "Request ID,Kitchen,Chef,Date,Item,Approved Qty,Unit\n";
    allApprovedOrders.forEach(order => {
        order.items.forEach(item => {
            csv += `"${order.requestId}","${order.section}","${order.chefName}","${order.submittedAt}","${item.name}",${item.approvedQty || item.originalQty},"${item.unit}"\n`;
        });
    });
    
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `approved_orders_${new Date().toISOString().slice(0,19)}.csv`;
    link.click();
    showToast("Exported to Excel");
}

function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

loadApprovedOrders();
setInterval(loadApprovedOrders, 5000);
</script>
</body>
</html>
