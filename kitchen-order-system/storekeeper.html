<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Storekeeper Dashboard - Real Orders</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
.header { background: linear-gradient(135deg, #1e5c3c, #2a8a50); color: white; padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
.header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
.logo { font-size: 1.3rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
.logo span { color: #ffd700; }
.header-buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn-header { background: rgba(255,255,255,0.2); border: none; padding: 8px 18px; border-radius: 25px; color: white; cursor: pointer; font-weight: 700; transition: 0.3s; }
.btn-header:hover { background: rgba(255,255,255,0.35); }
.refresh-btn { background: rgba(255,255,255,0.25); border: none; padding: 8px 14px; border-radius: 50%; color: white; cursor: pointer; font-weight: 700; font-size: 1.1rem; }
.main-tabs { background: white; padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 65px; z-index: 99; }
.main-tab-container { max-width: 1400px; margin: 0 auto; display: flex; gap: 20px; padding: 12px 0; }
.main-tab { padding: 10px 24px; background: #f0f2f5; border: none; border-radius: 30px; font-weight: 800; cursor: pointer; }
.main-tab.active { background: linear-gradient(135deg, #1e5c3c, #2a8a50); color: white; }
.kitchen-tabs { background: white; padding: 0 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow-x: auto; white-space: nowrap; }
.tabs-container { max-width: 1400px; margin: 0 auto; display: inline-flex; gap: 10px; padding: 12px 0; }
.tab-btn { padding: 10px 24px; background: #f0f2f5; border: none; border-radius: 30px; font-weight: 800; cursor: pointer; }
.tab-btn.active { background: linear-gradient(135deg, #1e5c3c, #2a8a50); color: white; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h3 { font-size: 1.1rem; margin-bottom: 18px; color: #1e5c3c; border-left: 4px solid #27ae60; padding-left: 12px; }
.filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filters input { padding: 10px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; flex: 1; min-width: 220px; }
.export-buttons { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
.export-buttons button, .archive-btn-header { background: #27ae60; color: white; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 800; }
.archive-btn-header { background: #e67e22 !important; }
.order-group { margin-bottom: 25px; border: 1px solid #eef2ff; border-radius: 12px; overflow: hidden; }
.order-header { background: #f8fafc; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.order-id { font-weight: bold; font-size: 0.85rem; color: #1e5c3c; font-family: monospace; }
.order-meta { display: flex; gap: 20px; font-size: 0.75rem; color: #666; flex-wrap: wrap; }
.kitchen-tag { background: #e8f5e9; color: #27ae60; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: 800; margin-left: 10px; }
.order-total { background: #fff3cd; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; color: #856404; }
.table-wrapper { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 12px 10px; font-weight: 800; color: #475569; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
.data-table td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
.data-table tbody tr:nth-child(even) { background: #f9fafb; }
.badge { padding: 4px 10px; border-radius: 14px; font-size: 11px; font-weight: 900; display: inline-block; }
.badge-approved { background: #dcfce7; color: #166534; }
.empty-state { text-align: center; padding: 50px; background: white; border-radius: 16px; color: #999; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; font-size: 12px; z-index: 1000; }
.modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
.modal-content { background: white; padding: 30px; border-radius: 24px; text-align: center; max-width: 450px; width: 90%; }
.modal-content input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: center; }
.modal-content button { background: #3498db; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 8px; }
.error-msg { color: #e74c3c; margin-top: 12px; }
.warning-buttons { display: flex; gap: 12px; margin-top: 15px; }
.warning-buttons button { flex: 1; }
.btn-danger { background: #e74c3c !important; }
.btn-secondary { background: #7f8c8d !important; }
.restore-btn { background: #27ae60 !important; font-size: 12px !important; padding: 5px 12px !important; margin-left: 10px; }
.firebase-config-panel { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
.firebase-config-panel input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; font-size: 12px; }
@media (max-width: 768px) { .filters { flex-direction: column; align-items: stretch; } .export-buttons { margin-left: 0; width: 100%; } .data-table th, .data-table td { font-size: 11px; padding: 8px 6px; } }
</style>
</head>
<body>

<!-- PASSWORD MODAL -->
<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Storekeeper Access</h2>
        <p>Enter password to continue</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="checkPassword()">Login</button>
        <div id="passwordError" class="error-msg"></div>
        <hr style="margin: 15px 0;">
        <h3>⚙️ Firebase Configuration</h3>
        <input type="text" id="fbApiKey" placeholder="API Key">
        <input type="text" id="fbProjectId" placeholder="Project ID">
        <input type="text" id="fbAuthDomain" placeholder="Auth Domain (optional)">
        <button onclick="saveFirebaseConfig()">💾 Save & Connect to YOUR Firebase</button>
        <div id="configStatus" style="font-size: 12px; margin-top: 10px; color: #666;"></div>
    </div>
</div>

<!-- ARCHIVE CONFIRMATION MODAL -->
<div id="archiveWarningModal" class="modal" style="display:none;">
    <div class="modal-content">
        <h2>⚠️ Archive Completed Orders</h2>
        <p>Move ALL approved orders to archive?</p>
        <p style="color:#e67e22;">Archived orders will be moved to "archived_orders" collection</p>
        <div class="warning-buttons">
            <button class="btn-danger" onclick="confirmArchiveAndClean()">✅ Yes, Archive</button>
            <button class="btn-secondary" onclick="closeArchiveModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">
    <div class="header">
        <div class="header-content">
            <div class="logo">📦 <span>Storekeeper | REAL Orders</span></div>
            <div class="header-buttons">
                <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
                <button class="btn-header" onclick="window.print()">🖨️ Print</button>
                <button class="btn-header archive-btn-header" onclick="showArchiveWarningModal()">🗄️ Archive Completed</button>
            </div>
        </div>
    </div>

    <div class="main-tabs">
        <div class="main-tab-container">
            <button class="main-tab active" id="tabActive" onclick="switchMainTab('active')">📋 Active Orders</button>
            <button class="main-tab" id="tabArchived" onclick="switchMainTab('archived')">📦 Archived Orders</button>
        </div>
    </div>

    <div id="activePanel">
        <div class="kitchen-tabs"><div class="tabs-container" id="tabsContainer"></div></div>
        <div id="activeOrdersContainer"></div>
    </div>

    <div id="archivedPanel" style="display:none;">
        <div class="container">
            <div class="card">
                <h3>📦 Archived Orders</h3>
                <div class="filters">
                    <input type="text" id="archiveSearch" placeholder="Search archived..." oninput="renderArchivedOrders()">
                </div>
                <div id="archivedOrdersList"></div>
            </div>
        </div>
    </div>
</div>

<script>
const STOREKEEPER_PASSWORD = "store123";
let db = null;
let allOrders = [];
let archivedOrders = [];
let currentKitchen = "all";
let currentMainTab = "active";
let filterState = { search: "" };

// Save/Load Firebase config from localStorage
function saveFirebaseConfig() {
    const config = {
        apiKey: document.getElementById("fbApiKey").value,
        projectId: document.getElementById("fbProjectId").value,
        authDomain: document.getElementById("fbAuthDomain").value || `${document.getElementById("fbProjectId").value}.firebaseapp.com`
    };
    if (!config.apiKey || !config.projectId) {
        document.getElementById("configStatus").innerHTML = "❌ API Key and Project ID are required!";
        return;
    }
    localStorage.setItem("firebase_config", JSON.stringify(config));
    document.getElementById("configStatus").innerHTML = "✅ Config saved! Click Login again.";
    showToast("Firebase config saved!");
}

function loadFirebaseConfig() {
    const saved = localStorage.getItem("firebase_config");
    if (saved) {
        const config = JSON.parse(saved);
        document.getElementById("fbApiKey").value = config.apiKey;
        document.getElementById("fbProjectId").value = config.projectId;
        document.getElementById("fbAuthDomain").value = config.authDomain;
        return config;
    }
    return null;
}

function initFirebase() {
    const config = loadFirebaseConfig();
    if (!config || !config.apiKey || config.apiKey === "") {
        console.log("No Firebase config yet");
        return false;
    }
    
    try {
        if (!firebase.apps.length) {
            const firebaseConfig = {
                apiKey: config.apiKey,
                authDomain: config.authDomain,
                projectId: config.projectId,
                storageBucket: `${config.projectId}.appspot.com`,
                messagingSenderId: "000000000000",
                appId: "1:000000000000:web:0000000000000000"
            };
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.firestore();
        console.log("✅ Firebase connected!");
        showToast("Connected to YOUR Firebase!");
        return true;
    } catch (error) {
        console.error("Firebase error:", error);
        showToast("❌ Firebase error: " + error.message);
        return false;
    }
}

function checkPassword() {
    if (document.getElementById("passwordInput").value === STOREKEEPER_PASSWORD) {
        const fbConnected = initFirebase();
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        
        if (fbConnected && db) {
            startRealtimeListener();
        } else {
            showToast("⚠️ Configure Firebase in the login panel first!");
            document.getElementById("configStatus").innerHTML = "⚠️ Enter your Firebase credentials above";
        }
    } else {
        document.getElementById("passwordError").innerHTML = "❌ Wrong password! Use: store123";
    }
}

function startRealtimeListener() {
    if (!db) return;
    
    // Listen to active orders (not archived)
    db.collection("kitchen_requests").where("archived", "!=", true).onSnapshot(snapshot => {
        allOrders = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.items && data.items.some(item => item.status === "approved")) {
                allOrders.push({ id: doc.id, ...data });
            }
        });
        renderTabs();
        renderActiveOrders();
        showToast(`📦 Loaded ${allOrders.length} active orders`);
    }, error => {
        console.error("Snapshot error:", error);
        showToast("Error loading data: " + error.message);
    });
    
    // Load archived orders
    db.collection("archived_orders").onSnapshot(snapshot => {
        archivedOrders = [];
        snapshot.forEach(doc => {
            archivedOrders.push({ id: doc.id, ...doc.data() });
        });
        if (currentMainTab === "archived") renderArchivedOrders();
    });
}

function manualRefresh() {
    if (db) {
        startRealtimeListener();
    } else {
        showToast("Firebase not connected. Configure first.");
    }
}

function formatDate(dateValue) {
    if (!dateValue) return "N/A";
    let d = dateValue.seconds ? new Date(dateValue.seconds * 1000) : new Date(dateValue);
    return d.toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function renderTabs() {
    const kitchens = ["all", "Hot Kitchen", "Cold Kitchen", "Pastry / Bakery", "Butchery", "Beach House", "Nihon Kitchen", "Staff Kitchen"];
    const container = document.getElementById("tabsContainer");
    if (!container) return;
    container.innerHTML = "";
    kitchens.forEach(k => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${currentKitchen === k ? 'active' : ''}`;
        btn.innerHTML = k;
        btn.onclick = () => { currentKitchen = k; renderTabs(); renderActiveOrders(); };
        container.appendChild(btn);
    });
}

function renderActiveOrders() {
    const container = document.getElementById("activeOrdersContainer");
    if (!container) return;
    
    let filtered = [...allOrders];
    if (currentKitchen !== "all") filtered = filtered.filter(o => o.section === currentKitchen);
    if (filterState.search) {
        const s = filterState.search.toLowerCase();
        filtered = filtered.filter(o => o.requestId?.toLowerCase().includes(s) || o.items.some(i => i.name?.toLowerCase().includes(s)));
    }
    
    container.innerHTML = `
        <div class="container">
            <div class="card">
                <h3>📋 Approved Orders ${allOrders.length > 0 ? `(${allOrders.length})` : ''}</h3>
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Search by item or request ID..." oninput="updateSearch()">
                    <div class="export-buttons">
                        <button onclick="exportPDF()">📄 Export PDF</button>
                        <button onclick="exportCSV()">📊 Export CSV</button>
                    </div>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
    `;
    displayOrdersList(filtered);
}

function updateSearch() {
    filterState.search = document.getElementById("searchInput")?.value || "";
    renderActiveOrders();
}

function displayOrdersList(orders) {
    const container = document.getElementById("ordersList");
    if (!container) return;
    
    if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No approved orders found in your Firebase</div>';
        return;
    }
    
    let html = "";
    orders.forEach(order => {
        const approvedItems = order.items.filter(item => item.status === "approved");
        let total = 0;
        html += `<div class="order-group">
            <div class="order-header">
                <div>
                    <span class="order-id">📄 ${order.requestId || order.id}</span>
                    <span class="kitchen-tag">${order.section || ""}</span>
                </div>
                <div class="order-meta">
                    <span>👨‍🍳 ${order.chefName || ""}</span>
                    <span>📅 ${formatDate(order.submittedAt)}</span>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead><tr><th>Code</th><th>Item Name</th><th>Qty</th><th>Unit</th><th>Price</th><th>Total</th><th>Approved By</th></tr></thead>
                    <tbody>`;
        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const rowTotal = qty * price;
            total += rowTotal;
            html += `<tr>
                <td>${item.code || ""}</td>
                <td><strong>${escapeHtml(item.name)}</strong></td>
                <td>${qty}</td>
                <td>${item.unit || ""}</td>
                <td>${price.toFixed(2)}</td>
                <td>${rowTotal.toFixed(2)}</td>
                <td><span class="badge badge-approved">✔ ${item.approvedBy || ""}</span></td>
            </tr>`;
        });
        html += `</tbody></table></div>
            <div style="padding: 10px 15px; background: #f0fdf4; text-align: right;">
                <span class="order-total">💰 Total: ${total.toFixed(2)} EGP</span>
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function renderArchivedOrders() {
    const container = document.getElementById("archivedOrdersList");
    if (!container) return;
    
    const search = document.getElementById("archiveSearch")?.value.toLowerCase() || "";
    let filtered = archivedOrders.filter(o => !search || o.requestId?.toLowerCase().includes(search));
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No archived orders</div>';
        return;
    }
    
    let html = `<div style="padding: 10px; background: #e8f5e9; border-radius: 8px; margin-bottom: 15px;">📊 Total Archived: ${filtered.length}</div>`;
    filtered.forEach((order, idx) => {
        const approvedItems = order.items?.filter(item => item.status === "approved") || [];
        let total = 0;
        html += `<div class="order-group">
            <div class="order-header">
                <div><span class="order-id">📄 ${order.requestId || order.id}</span><span class="kitchen-tag">${order.section || ""}</span></div>
                <div class="order-meta">
                    <span>👨‍🍳 ${order.chefName || ""}</span>
                    <span>🗄️ Archived: ${formatDate(order.archivedAt)}</span>
                    <button class="restore-btn" onclick="restoreOrder('${order.id}')">↩️ Restore</button>
                </div>
            </div>
            <div class="table-wrapper"><table class="data-table"><thead><tr><th>Code</th><th>Item</th><th>Qty</th><th>Unit</th><th>Price</th><th>Total</th></tr></thead><tbody>`;
        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const rowTotal = qty * price;
            total += rowTotal;
            html += `<tr><td>${item.code || ""}</td><td>${escapeHtml(item.name)}</td><td>${qty}</td><td>${item.unit || ""}</td><td>${price.toFixed(2)}</td><td>${rowTotal.toFixed(2)}</td></tr>`;
        });
        html += `</tbody></table></div><div style="padding:10px 15px;background:#fff3cd;text-align:right;"><span class="order-total">💰 Total: ${total.toFixed(2)} EGP</span></div></div>`;
    });
    container.innerHTML = html;
}

async function restoreOrder(orderId) {
    if (!db) { showToast("Firebase not connected"); return; }
    try {
        const archivedDoc = await db.collection("archived_orders").doc(orderId).get();
        if (archivedDoc.exists) {
            const orderData = archivedDoc.data();
            delete orderData.archivedAt;
            await db.collection("kitchen_requests").doc(orderId).set({ ...orderData, archived: false });
            await db.collection("archived_orders").doc(orderId).delete();
            showToast("✅ Order restored to active");
        }
    } catch (error) {
        showToast("Restore failed: " + error.message);
    }
}

function showArchiveWarningModal() {
    if (allOrders.length === 0) { showToast("No active orders to archive"); return; }
    document.getElementById("archiveWarningModal").style.display = "flex";
}

function closeArchiveModal() {
    document.getElementById("archiveWarningModal").style.display = "none";
}

async function confirmArchiveAndClean() {
    closeArchiveModal();
    if (!db || allOrders.length === 0) return;
    showToast("Archiving orders...");
    
    for (const order of allOrders) {
        try {
            await db.collection("archived_orders").doc(order.id).set({
                ...order,
                archivedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("kitchen_requests").doc(order.id).update({ archived: true });
        } catch (e) { console.error(e); }
    }
    showToast(`✅ Archived ${allOrders.length} orders`);
}

function switchMainTab(tab) {
    currentMainTab = tab;
    document.getElementById("activePanel").style.display = tab === "active" ? "block" : "none";
    document.getElementById("archivedPanel").style.display = tab === "archived" ? "block" : "none";
    document.getElementById("tabActive").classList.toggle("active", tab === "active");
    document.getElementById("tabArchived").classList.toggle("active", tab === "archived");
    if (tab === "archived") renderArchivedOrders();
}

async function exportPDF() {
    if (allOrders.length === 0) { showToast("No orders to export"); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF("p", "mm", "a4");
    let y = 20;
    doc.setFontSize(18); doc.text("Storekeeper Orders Report", 14, y); y += 10;
    doc.setFontSize(10); doc.text(`Generated: ${new Date().toLocaleString()}`, 14, y); y += 10;
    let grandTotal = 0;
    
    for (const order of allOrders) {
        const items = order.items.filter(i => i.status === "approved");
        if (items.length === 0) continue;
        doc.setFontSize(11); doc.text(`Order: ${order.requestId || order.id}`, 14, y); y += 5;
        doc.text(`Kitchen: ${order.section || ""} | Chef: ${order.chefName || ""}`, 14, y); y += 5;
        doc.text(`Date: ${formatDate(order.submittedAt)}`, 14, y); y += 5;
        
        const rows = [];
        let orderTotal = 0;
        items.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const total = qty * price;
            orderTotal += total;
            grandTotal += total;
            rows.push([item.code || "", item.name || "", qty, item.unit || "", price.toFixed(2), total.toFixed(2)]);
        });
        doc.autoTable({ startY: y, head: [["Code", "Item", "Qty", "Unit", "Price", "Total"]], body: rows, styles: { fontSize: 8 }, headStyles: { fillColor: [30, 92, 60] }, margin: { left: 14, right: 14 } });
        y = doc.lastAutoTable.finalY + 5;
        doc.text(`Order Total: ${orderTotal.toFixed(2)} EGP`, 14, y); y += 10;
        if (y > 250) { doc.addPage(); y = 20; }
    }
    doc.setFontSize(12); doc.text(`GRAND TOTAL: ${grandTotal.toFixed(2)} EGP`, 14, y);
    doc.save(`orders_${new Date().toISOString().slice(0, 10)}.pdf`);
    showToast("PDF Exported");
}

function exportCSV() {
    let csv = "Request ID,Kitchen,Chef,Item,Approved Qty,Unit,Price,Total\n";
    allOrders.forEach(order => {
        order.items.forEach(item => {
            if (item.status === "approved") {
                const qty = item.approvedQty || item.originalQty || 0;
                const total = qty * (item.price || 0);
                csv += `"${order.requestId}","${order.section}","${order.chefName}","${item.name}",${qty},"${item.unit}",${item.price || 0},${total}\n`;
            }
        });
    });
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `orders_${new Date().toISOString().slice(0, 10)}.csv`;
    link.click();
    showToast("CSV Exported");
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function showToast(msg) { const toast = document.createElement("div"); toast.className = "toast"; toast.innerText = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500); }

window.onload = () => {
    loadFirebaseConfig();
    document.getElementById("passwordModal").style.display = "flex";
};
</script>
</body>
