<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Storekeeper Dashboard - Final Approved Orders</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

/* Header */
.header {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.logo {
    font-size: 1.2rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-icon {
    font-size: 1.5rem;
}

.logo span {
    color: #ffd700;
}

.header-buttons {
    display: flex;
    gap: 8px;
}

.btn-header {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 12px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
    transition: all 0.3s;
}

.btn-header:active {
    transform: scale(0.95);
}

/* Kitchen Tabs */
.kitchen-tabs {
    background: white;
    padding: 0 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 60px;
    z-index: 99;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
}

.tabs-container {
    max-width: 1400px;
    margin: 0 auto;
    display: inline-flex;
    gap: 8px;
    padding: 10px 0;
}

.tab-btn {
    padding: 8px 16px;
    background: #f0f2f5;
    border: none;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
    transition: all 0.3s;
}

.tab-btn:active {
    transform: scale(0.95);
}

.tab-btn.active {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
}

/* Container */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
}

.kitchen-page {
    display: none;
}

.kitchen-page.active-page {
    display: block;
}

/* Cards */
.card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
    font-size: 1rem;
    margin-bottom: 14px;
    color: #1e5c3c;
    border-left: 4px solid #27ae60;
    padding-left: 10px;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.stat-card {
    background: white;
    padding: 14px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.stat-number {
    font-size: 1.8rem;
    font-weight: bold;
    color: #27ae60;
}

.stat-label {
    color: #666;
    margin-top: 4px;
    font-size: 0.7rem;
    text-transform: uppercase;
}

/* Orders Table */
.orders-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.orders-table {
    min-width: 500px;
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

.orders-table th, .orders-table td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

.orders-table th {
    background: #f8f9fa;
    font-weight: 600;
}

.empty-state {
    text-align: center;
    padding: 50px 20px;
    background: white;
    border-radius: 16px;
    color: #999;
    font-size: 0.85rem;
}

/* Filters */
.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
}

.filters select, .filters input {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 13px;
    background: white;
}

.filters button {
    background: #3498db;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 12px;
}

/* Toast */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 1000;
}

/* Password Modal */
.modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: white;
    padding: 24px;
    border-radius: 24px;
    text-align: center;
    max-width: 350px;
    width: 100%;
}

.modal-content h2 {
    margin-bottom: 15px;
    color: #1a1a2e;
    font-size: 1.3rem;
}

.modal-content p {
    color: #666;
    font-size: 0.85rem;
    margin-bottom: 20px;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
}

.modal-content button {
    background: #3498db;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    font-size: 1rem;
}

.error-msg {
    color: #e74c3c;
    margin-top: 12px;
    font-size: 0.8rem;
}

@media (min-width: 768px) {
    .stats-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    
    .stat-number {
        font-size: 2rem;
    }
}

@media (max-width: 480px) {
    .filters {
        flex-direction: column;
    }
    
    .filters select, .filters input, .filters button {
        width: 100%;
    }
    
    .orders-table {
        min-width: 450px;
    }
}
</style>
</head>
<body>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h2>🔐 Storekeeper Access</h2>
        <p>Enter password to continue</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="checkPassword()">Login</button>
        <div id="passwordError" class="error-msg"></div>
    </div>
</div>

<div id="mainContent" style="display: none;">
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">📦</span>
                <span>Storekeeper <span>| Approved Orders</span></span>
            </div>
            <div class="header-buttons">
                <button class="btn-header" onclick="exportAllToExcel()">📎 Export</button>
                <button class="btn-header" onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>

    <div class="kitchen-tabs">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="selectKitchen('all')">📋 All Kitchens</button>
            <button class="tab-btn" onclick="selectKitchen('Hot Kitchen')">🔥 Hot</button>
            <button class="tab-btn" onclick="selectKitchen('Cold Kitchen')">❄️ Cold</button>
            <button class="tab-btn" onclick="selectKitchen('Pastry')">🍰 Pastry</button>
            <button class="tab-btn" onclick="selectKitchen('Butchery')">🥩 Butchery</button>
            <button class="tab-btn" onclick="selectKitchen('Beach House')">🏖️ Beach</button>
            <button class="tab-btn" onclick="selectKitchen('Nihon Kitchen')">🍜 Nihon</button>
            <button class="tab-btn" onclick="selectKitchen('Staff Kitchen')">👥 Staff</button>
        </div>
    </div>

    <div id="kitchenPagesContainer"></div>
</div>

<script>
const STOREKEEPER_PASSWORD = "store123";
let currentKitchen = "all";
let allApprovedOrders = [];

function checkPassword() {
    if(document.getElementById("passwordInput").value === STOREKEEPER_PASSWORD) {
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        loadApprovedOrders();
        setInterval(loadApprovedOrders, 5000);
    } else {
        document.getElementById("passwordError").innerHTML = "Wrong password! Try: store123";
    }
}

async function loadApprovedOrders() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allApprovedOrders = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.items && data.items.every(item => item.status === "approved")) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });
        renderCurrentKitchen();
    } catch (error) {
        console.error("Error:", error);
    }
}

function renderCurrentKitchen() {
    if(currentKitchen === "all") {
        renderKitchenPage("all", allApprovedOrders);
    } else {
        const filtered = allApprovedOrders.filter(o => o.section === currentKitchen);
        renderKitchenPage(currentKitchen, filtered);
    }
}

function renderKitchenPage(kitchen, orders) {
    const container = document.getElementById("kitchenPagesContainer");
    
    let totalOrders = orders.length;
    let totalItems = 0;
    let totalQuantity = 0;
    const uniqueItems = new Set();
    
    orders.forEach(order => {
        totalItems += order.items.length;
        order.items.forEach(item => {
            totalQuantity += item.approvedQty || item.originalQty;
            uniqueItems.add(item.name);
        });
    });
    
    let statsHtml = `
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number">${totalOrders}</div><div class="stat-label">Orders</div></div>
                <div class="stat-card"><div class="stat-number">${totalItems}</div><div class="stat-label">Items</div></div>
                <div class="stat-card"><div class="stat-number">${totalQuantity}</div><div class="stat-label">Quantity</div></div>
                <div class="stat-card"><div class="stat-number">${uniqueItems.size}</div><div class="stat-label">Unique</div></div>
            </div>
            <div class="card">
                <h3>📋 ${kitchen === "all" ? "All Kitchens" : kitchen} - Approved Orders</h3>
                <div class="filters">
                    <input type="date" id="dateFrom" placeholder="From Date">
                    <input type="date" id="dateTo" placeholder="To Date">
                    <button onclick="filterOrders()">🔄 Filter</button>
                </div>
                <div class="orders-wrapper" id="ordersWrapper"></div>
            </div>
        </div>
    `;
    
    container.innerHTML = statsHtml;
    displayOrders(orders);
}

function displayOrders(orders) {
    const wrapper = document.getElementById("ordersWrapper");
    
    let dateFrom = document.getElementById("dateFrom")?.value;
    let dateTo = document.getElementById("dateTo")?.value;
    
    let filtered = [...orders];
    if(dateFrom) {
        filtered = filtered.filter(o => new Date(o.submittedAt) >= new Date(dateFrom));
    }
    if(dateTo) {
        const endDate = new Date(dateTo);
        endDate.setHours(23, 59, 59);
        filtered = filtered.filter(o => new Date(o.submittedAt) <= endDate);
    }
    
    filtered.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
    
    if(filtered.length === 0) {
        wrapper.innerHTML = '<div class="empty-state">📭 No approved orders found</div>';
        return;
    }
    
    let tableHtml = `
        <table class="orders-table">
            <thead>
                <tr><th>ID</th><th>Chef</th><th>Date</th><th>Items</th><th>Qty</th></tr>
            </thead>
            <tbody>
    `;
    
    filtered.forEach(order => {
        const itemsList = order.items.map(item => `${item.name} (${item.approvedQty || item.originalQty} ${item.unit})`).join(", ");
        const totalQty = order.items.reduce((sum, item) => sum + (item.approvedQty || item.originalQty), 0);
        
        tableHtml += `
            <tr>
                <td><strong>${order.requestId}</strong></td>
                <td>${order.chefName}</td>
                <td>${order.submittedAt}</td>
                <td style="font-size:0.8rem;">${itemsList.substring(0, 60)}${itemsList.length > 60 ? "..." : ""}</td>
                <td><strong>${totalQty}</strong></td>
            </tr>
        `;
    });
    
    tableHtml += `</tbody></table>`;
    wrapper.innerHTML = tableHtml;
}

function filterOrders() {
    renderCurrentKitchen();
}

function selectKitchen(kitchen) {
    currentKitchen = kitchen;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderCurrentKitchen();
}

function exportAllToExcel() {
    if(allApprovedOrders.length === 0) { alert("No data to export"); return; }
    
    let csv = "Request ID,Kitchen,Chef,Date,Item,Approved Qty,Unit\n";
    allApprovedOrders.forEach(order => {
        order.items.forEach(item => {
            csv += `"${order.requestId}","${order.section}","${order.chefName}","${order.submittedAt}","${item.name}",${item.approvedQty || item.originalQty},"${item.unit}"\n`;
        });
    });
    
    const blob = new Blob(["\uFEFF" + csv], {type: "text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `approved_orders_${new Date().toISOString().slice(0,19)}.csv`;
    link.click();
    showToast("Exported");
}

function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

window.onload = () => { document.getElementById("passwordModal").style.display = "flex"; };
</script>
</body>
</html>
