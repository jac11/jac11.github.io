<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>RESTRO PRO | Executive Dashboard</title>
  <!-- Google Fonts + Font Awesome 6 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #f0f4f9;
      font-family: 'Inter', sans-serif;
      padding: 24px 20px 56px 20px;
      color: #101d2f;
    }

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* premium glass header */
    .hero-pro {
      background: linear-gradient(115deg, #0A2A38 0%, #124E6B 100%);
      border-radius: 44px;
      padding: 28px 32px;
      margin-bottom: 32px;
      box-shadow: 0 22px 35px -12px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }
    .hero-pro::after {
      content: '';
      position: absolute;
      top: -30px;
      right: -20px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
    }
    .hero-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .brand h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.3px;
    }
    .brand p {
      color: #bcd9f0;
      font-size: 0.85rem;
      margin-top: 6px;
    }
    .live-tag {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      padding: 8px 24px;
      border-radius: 80px;
      font-family: monospace;
      font-weight: 600;
      font-size: 0.85rem;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* KPI 4-grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
      margin-bottom: 32px;
    }
    .kpi-card {
      background: white;
      border-radius: 32px;
      padding: 22px 20px;
      transition: all 0.25s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.04);
      border: 1px solid #eef2f8;
    }
    .kpi-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 28px -12px rgba(0,0,0,0.12);
    }
    .kpi-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5c7c9e;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kpi-value {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.2;
    }

    /* 2 columns layout */
    .two-col-pro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      margin-bottom: 36px;
    }
    .card-pro {
      background: white;
      border-radius: 36px;
      padding: 26px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.03);
      border: 1px solid #edf2f9;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.25rem;
      margin-bottom: 24px;
      border-left: 4px solid #1F6E8C;
      padding-left: 16px;
    }

    /* form styling */
    .input-row {
      margin-bottom: 18px;
    }
    .input-row label {
      font-weight: 600;
      font-size: 0.75rem;
      display: block;
      margin-bottom: 8px;
      color: #274e6b;
    }
    select, input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 26px;
      border: 1.5px solid #e3ecf3;
      font-size: 0.9rem;
      background: white;
      transition: 0.2s;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #1F6E8C;
      box-shadow: 0 0 0 3px rgba(31,110,140,0.12);
    }
    .btn-save-pro {
      background: #1F6E8C;
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      border-radius: 44px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-save-pro:active { transform: scale(0.97); background: #0f556f; }

    /* chart container */
    .chart-box {
      height: 280px;
      width: 100%;
      margin-top: 6px;
    }

    /* reports timeline - pro card style */
    .reports-pro-container {
      background: white;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid #edf2f9;
      box-shadow: 0 8px 22px rgba(0,0,0,0.03);
    }
    .reports-header-pro {
      padding: 24px 28px 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #f0f5fc;
      flex-wrap: wrap;
    }
    .reports-feed {
      max-height: 480px;
      overflow-y: auto;
    }
    .report-item-pro {
      padding: 22px 28px;
      border-bottom: 1px solid #f0f5fc;
      transition: background 0.15s;
    }
    .report-item-pro:last-child { border-bottom: none; }
    .row-flex {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 14px;
    }
    .resto-badge-pro {
      font-weight: 800;
      background: #eef3fc;
      padding: 6px 22px;
      border-radius: 60px;
      font-size: 0.9rem;
      color: #1a5d7a;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .datetime-badge {
      font-size: 0.7rem;
      color: #7b99b5;
      font-family: monospace;
      background: #f8fafd;
      padding: 5px 12px;
      border-radius: 40px;
    }
    .metrics-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin: 12px 0 6px;
    }
    .metric-pill {
      background: #f9fbfe;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
    }
    .empty-state-pro {
      text-align: center;
      padding: 70px 24px;
      color: #9bb7d0;
    }

    /* alert toast */
    .alert-toast {
      background: #124E6B;
      color: white;
      border-radius: 60px;
      padding: 12px 24px;
      margin-bottom: 20px;
      font-weight: 500;
      font-size: 0.85rem;
      text-align: center;
      animation: fadeSlide 0.2s ease;
    }
    .alert-error { background: #c2412c; }
    .alert-success { background: #1f7a5a; }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 900px) {
      .kpi-grid { grid-template-columns: repeat(2,1fr); gap: 16px; }
      .two-col-pro { grid-template-columns: 1fr; gap: 24px; }
      body { padding: 16px; }
      .kpi-value { font-size: 1.9rem; }
    }
    @media (max-width: 550px) {
      .report-item-pro { padding: 18px; }
      .resto-badge-pro { font-size: 0.8rem; }
    }
    i { margin-right: 6px; }
  </style>
</head>
<body>
<div class="dashboard">
  <!-- Header premium -->
  <div class="hero-pro">
    <div class="hero-flex">
      <div class="brand">
        <h1><i class="fas fa-chart-simple"></i> RESTRO PRO</h1>
        <p>Executive analytics · Real-time firestore</p>
      </div>
      <div class="live-tag" id="liveClock"></div>
    </div>
  </div>

  <div id="globalAlert"></div>

  <!-- KPI Cards -->
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-coins"></i> TOTAL REVENUE</div><div class="kpi-value" id="totalRevenueSpan">0 EGP</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-utensils"></i> TOTAL COVERS</div><div class="kpi-value" id="totalCoversSpan">0</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-chart-line"></i> AVG SPEND</div><div class="kpi-value" id="avgSpendSpan">0 EGP</div></div>
    <div class="kpi-card"><div class="kpi-title"><i class="fas fa-crown"></i> BEST PERFORMER</div><div class="kpi-value" id="bestRestSpan">—</div></div>
  </div>

  <!-- Entry + Chart -->
  <div class="two-col-pro">
    <!-- LEFT: SAVE REPORT (no notes, each report gets own date & time) -->
    <div class="card-pro">
      <div class="card-header"><i class="fas fa-pen-ruler"></i> New Report Entry</div>
      <div class="input-row">
        <label><i class="fas fa-store"></i> Restaurant</label>
        <select id="restaurantSelect">
          <option value="" disabled selected>— Select restaurant —</option>
          <option value="The Restaurant">The Restaurant</option>
          <option value="The Beach House">The Beach House</option>
          <option value="Nihon">Nihon</option>
        </select>
      </div>
      <div class="input-row">
        <label><i class="fas fa-chair"></i> Covers (guests)</label>
        <input type="number" id="coversInput" placeholder="e.g., 84">
      </div>
      <div class="input-row">
        <label><i class="fas fa-money-bill-wave"></i> Revenue (EGP)</label>
        <input type="number" id="revenueInput" placeholder="e.g., 32450">
      </div>
      <div class="input-row">
        <label><i class="fas fa-user-check"></i> Manager</label>
        <input type="text" id="managerInput" placeholder="Full name">
      </div>
      <button class="btn-save-pro" id="saveReportBtn"><i class="fas fa-cloud-upload-alt"></i> Save report (auto date & time)</button>
    </div>

    <!-- RIGHT: CHART -->
    <div class="card-pro">
      <div class="card-header"><i class="fas fa-chart-column"></i> Today's Revenue by Venue</div>
      <div class="chart-box">
        <canvas id="revenueCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- REPORTS SECTION: each line shows its own full date + time (no notes/comments) -->
  <div class="reports-pro-container">
    <div class="reports-header-pro">
      <span style="font-weight: 800; font-size: 1.2rem;"><i class="fas fa-list-ul"></i> Activity timeline</span>
      <span style="font-size: 0.7rem; background: #eef3fc; padding: 6px 14px; border-radius: 50px;"><i class="far fa-calendar-alt"></i> each report with own timestamp</span>
    </div>
    <div class="reports-feed" id="reportsFeed">
      <div class="empty-state-pro"><i class="fas fa-spinner fa-pulse"></i> Loading executive data...</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, addDoc, query, where, getDocs, serverTimestamp } from "firebase/firestore";

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDz8wXx14B16B5sRzJ20qPQb6K4fNetHrE",
    authDomain: "restaurant-analytics-27bd8.firebaseapp.com",
    databaseURL: "https://restaurant-analytics-27bd8-default-rtdb.firebaseio.com",
    projectId: "restaurant-analytics-27bd8",
    storageBucket: "restaurant-analytics-27bd8.firebasestorage.app",
    messagingSenderId: "280901089364",
    appId: "1:280901089364:web:26958c4c5334092194d5c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // DOM elements
  const restaurantSelect = document.getElementById("restaurantSelect");
  const coversInput = document.getElementById("coversInput");
  const revenueInput = document.getElementById("revenueInput");
  const managerInput = document.getElementById("managerInput");
  const saveBtn = document.getElementById("saveReportBtn");
  const totalRevenueSpan = document.getElementById("totalRevenueSpan");
  const totalCoversSpan = document.getElementById("totalCoversSpan");
  const avgSpendSpan = document.getElementById("avgSpendSpan");
  const bestRestSpan = document.getElementById("bestRestSpan");
  const reportsFeed = document.getElementById("reportsFeed");

  let revenueChart;
  const chartCtx = document.getElementById("revenueCanvas").getContext("2d");

  // Helper: show toast
  function showMessage(text, isError = false) {
    const alertDiv = document.getElementById("globalAlert");
    const cls = isError ? "alert-error" : "alert-success";
    alertDiv.innerHTML = `<div class="alert-toast ${cls}"><i class="fas ${isError ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i> ${text}</div>`;
    setTimeout(() => { if (alertDiv.firstChild) alertDiv.innerHTML = ""; }, 3200);
  }

  // format readable date + time from Firebase timestamp OR fallback
  function formatFullDateTime(timestamp) {
    if (!timestamp) return "just now";
    try {
      const date = timestamp.toDate();
      const day = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      return `${day} at ${time}`;
    } catch(e) {
      return "recent";
    }
  }

  // live clock
  function updateClock() {
    const now = new Date();
    const formatted = `${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} • ${now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' })}`;
    document.getElementById("liveClock").innerText = formatted;
  }
  updateClock();
  setInterval(updateClock, 60000);

  const getTodayStr = () => new Date().toISOString().split('T')[0];
  let todayDate = getTodayStr();

  // LOAD DATA (no notes, each report includes its own date & time based on createdAt)
  async function loadDashboard() {
    try {
      const q = query(collection(db, "dailyReports"), where("date", "==", todayDate));
      const snapshot = await getDocs(q);
      
      let totalRevenue = 0;
      let totalCovers = 0;
      let revenueMap = {
        "The Restaurant": 0,
        "The Beach House": 0,
        "Nihon": 0
      };
      let allReports = [];
      
      snapshot.forEach(doc => {
        const data = doc.data();
        allReports.push(data);
        const rev = Number(data.revenue) || 0;
        const cov = Number(data.covers) || 0;
        totalRevenue += rev;
        totalCovers += cov;
        if (revenueMap.hasOwnProperty(data.restaurant)) {
          revenueMap[data.restaurant] += rev;
        }
      });
      
      // sort reports by creation time (newest first)
      allReports.sort((a,b) => {
        const timeA = a.createdAt?.toMillis?.() || 0;
        const timeB = b.createdAt?.toMillis?.() || 0;
        return timeB - timeA;
      });
      
      // build PRO timeline (each entry shows its own exact date & time)
      if (allReports.length === 0) {
        reportsFeed.innerHTML = `<div class="empty-state-pro"><i class="fas fa-file-alt"></i> No reports today. Start by saving new entry.</div>`;
      } else {
        let html = "";
        allReports.forEach(rep => {
          const restName = rep.restaurant;
          const rev = Number(rep.revenue);
          const cov = Number(rep.covers);
          const manager = rep.manager || "—";
          const createdAtTimestamp = rep.createdAt;
          const displayDateTime = formatFullDateTime(createdAtTimestamp);
          
          html += `
            <div class="report-item-pro">
              <div class="row-flex">
                <span class="resto-badge-pro"><i class="fas fa-flag-checkered"></i> ${escapeHtml(restName)}</span>
                <span class="datetime-badge"><i class="far fa-calendar-clock"></i> ${escapeHtml(displayDateTime)}</span>
              </div>
              <div class="metrics-inline">
                <span class="metric-pill"><i class="fas fa-group"></i> ${cov.toLocaleString()} covers</span>
                <span class="metric-pill"><i class="fas fa-chart-simple"></i> ${rev.toLocaleString()} EGP</span>
                <span class="metric-pill"><i class="fas fa-user"></i> ${escapeHtml(manager)}</span>
              </div>
            </div>
          `;
        });
        reportsFeed.innerHTML = html;
      }
      
      // update KPIs
      totalRevenueSpan.innerText = totalRevenue.toLocaleString() + " EGP";
      totalCoversSpan.innerText = totalCovers.toLocaleString();
      const avg = totalCovers > 0 ? (totalRevenue / totalCovers).toFixed(2) : 0;
      avgSpendSpan.innerText = avg.toLocaleString() + " EGP";
      
      let best = "—";
      let maxVal = 0;
      for (let [r, val] of Object.entries(revenueMap)) {
        if (val > maxVal) {
          maxVal = val;
          best = r;
        }
      }
      bestRestSpan.innerText = (maxVal === 0) ? "—" : best;
      
      // update chart
      if (revenueChart) {
        revenueChart.data.datasets[0].data = [
          revenueMap["The Restaurant"] || 0,
          revenueMap["The Beach House"] || 0,
          revenueMap["Nihon"] || 0
        ];
        revenueChart.update();
      }
      
    } catch (err) {
      console.error(err);
      showMessage("Firestore load error: update security rules (allow read/write)", true);
      reportsFeed.innerHTML = `<div class="empty-state-pro"><i class="fas fa-database"></i> Connection issue. Check Firebase rules.</div>`;
    }
  }

  // SAVE REPORT (auto adds full serverTimestamp + date field) — NO NOTES field
  async function saveReportToFirebase() {
    const selectedRest = restaurantSelect.value;
    if (!selectedRest || selectedRest === "") {
      showMessage("Please select a restaurant", true);
      return;
    }
    const covers = parseInt(coversInput.value);
    const revenue = parseInt(revenueInput.value);
    const manager = managerInput.value.trim();
    
    if (!covers || covers <= 0 || isNaN(covers)) {
      showMessage("Covers must be a positive number", true);
      return;
    }
    if (!revenue || revenue <= 0 || isNaN(revenue)) {
      showMessage("Revenue must be a positive number", true);
      return;
    }
    if (!manager || manager.length < 2) {
      showMessage("Manager name is required", true);
      return;
    }
    
    try {
      // Each report stores its own date + serverTimestamp (exact date & time)
      await addDoc(collection(db, "dailyReports"), {
        restaurant: selectedRest,
        covers: covers,
        revenue: revenue,
        manager: manager,
        date: todayDate,          // used for daily filtering
        createdAt: serverTimestamp()  // 🔥 precise date & time per report
      });
      
      showMessage(`✅ ${selectedRest} — ${revenue.toLocaleString()} EGP saved with timestamp`, false);
      
      // reset form
      restaurantSelect.value = "";
      coversInput.value = "";
      revenueInput.value = "";
      managerInput.value = "";
      
      // refresh dashboard
      await loadDashboard();
      
    } catch (err) {
      console.error(err);
      showMessage(`Save error: ${err.message}. Ensure Firestore allows writes`, true);
    }
  }
  
  // Chart initialization (premium style)
  function initRevenueChart() {
    revenueChart = new Chart(chartCtx, {
      type: 'bar',
      data: {
        labels: ['The Restaurant', 'The Beach House', 'Nihon'],
        datasets: [{
          label: 'Revenue (EGP)',
          data: [0, 0, 0],
          backgroundColor: ['#226688', '#308A6E', '#C27E3A'],
          borderRadius: 14,
          barPercentage: 0.7,
          categoryPercentage: 0.8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { position: 'top', labels: { font: { size: 11, weight: '600' } } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.raw.toLocaleString()} EGP` } }
        },
        scales: {
          y: { beginAtZero: true, grid: { color: '#eef2f5' }, ticks: { callback: (val) => val.toLocaleString() } },
          x: { ticks: { font: { weight: '500' } } }
        }
      }
    });
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // event binding
  saveBtn.addEventListener("click", saveReportToFirebase);
  initRevenueChart();
  loadDashboard();
  
  // optional refresh on visibility
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) loadDashboard();
  });
</script>
</body>
</html>
