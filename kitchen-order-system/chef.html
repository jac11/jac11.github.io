<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Chef Dashboard - Kitchen Order System</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; }

.header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 16px 24px; position: sticky; top: 0; z-index: 100; }
.header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; flex-wrap: wrap; gap: 10px; }
.logo { font-size: 1.4rem; font-weight: bold; }
.logo span { color: #ffd700; }
.header-buttons { display: flex; gap: 10px; }
.logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; border-radius: 25px; color: white; font-weight: 600; cursor: pointer; }
.refresh-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 25px; color: white; font-weight: 600; cursor: pointer; }
.refresh-btn:hover { background: rgba(255,255,255,0.3); }

.kitchen-tabs { background: white; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: sticky; top: 70px; z-index: 99; overflow-x: auto; white-space: nowrap; }
.tabs-container { max-width: 1400px; margin: 0 auto; display: flex; gap: 8px; padding: 12px 0; }
.tab-btn { padding: 12px 24px; background: #f0f2f5; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 14px; white-space: nowrap; }
.tab-btn:hover { background: #e0e0e0; transform: translateY(-2px); }
.tab-btn.active { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.kitchen-page { display: none; }
.kitchen-page.active-page { display: block; }
.card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h3 { font-size: 1.2rem; margin-bottom: 18px; color: #1e3c72; border-left: 4px solid #3498db; padding-left: 12px; }

.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; }
.required { color: #e74c3c; margin-left: 4px; }
.error-message { color: #e74c3c; font-size: 12px; margin-top: 5px; }
