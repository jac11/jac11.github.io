<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Storekeeper Dashboard - Approved Orders</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

.header {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.return-btn {
    background: linear-gradient(135deg, #95a5a6, #7f8c8d) !important;
    color: white !important;
    border: none !important;
    padding: 14px !important;
    border-radius: 40px !important;
    font-weight: 800 !important;
    cursor: pointer !important;
    width: 100% !important;
    font-size: 1rem !important;
    margin-top: 10px !important;
    transition: all 0.25s ease !important;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
}

.return-btn:hover {
    background: linear-gradient(135deg, #7f8c8d, #6c7a7b) !important;
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.18);
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

.logo {
    font-size: 1.3rem;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo span {
    color: #ffd700;
}

.header-buttons {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
}

.btn-header {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 18px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-weight: 700;
    transition: 0.3s;
}

.btn-header:hover {
    background: rgba(255,255,255,0.35);
}

.refresh-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    padding: 8px 14px;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    font-size: 1.1rem;
}

.archive-btn {
    background: #ff9800;
    color: #2c3e2c;
}

.kitchen-tabs {
    background: white;
    padding: 0 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    position: sticky;
    top: 65px;
    z-index: 99;
    overflow-x: auto;
    white-space: nowrap;
}

.tabs-container {
    max-width: 1400px;
    margin: 0 auto;
    display: inline-flex;
    gap: 10px;
    padding: 12px 0;
}

.tab-btn {
    padding: 10px 24px;
    background: #f0f2f5;
    border: none;
    border-radius: 30px;
    font-weight: 800;
    cursor: pointer;
}

.tab-btn.active {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.card h3 {
    font-size: 1.1rem;
    margin-bottom: 18px;
    color: #1e5c3c;
    border-left: 4px solid #27ae60;
    padding-left: 12px;
}

.filters {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
}

.filters input {
    padding: 10px 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    flex: 1;
    min-width: 220px;
}

.filters button {
    background: #3498db;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 800;
}

.export-buttons {
    display: flex;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
}

.export-buttons button {
    background: #27ae60;
}

.order-group {
    margin-bottom: 25px;
    border: 1px solid #eef2ff;
    border-radius: 12px;
    overflow: hidden;
}

.order-header {
    background: #f8fafc;
    padding: 12px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.order-id {
    font-weight: bold;
    font-size: 0.85rem;
    color: #1e5c3c;
    font-family: monospace;
}

.order-meta {
    display: flex;
    gap: 20px;
    font-size: 0.75rem;
    color: #666;
    flex-wrap: wrap;
}

.kitchen-tag {
    background: #e8f5e9;
    color: #27ae60;
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 0.7rem;
    font-weight: 800;
    margin-left: 10px;
}

.order-total {
    background: #fff3cd;
    padding: 8px 15px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 0.8rem;
    color: #856404;
}

.table-wrapper {
    overflow-x: auto;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.data-table th, .data-table td {
    padding: 12px 10px;
    text-align: left;
    border-bottom: 1px solid #f1f5f9;
}

.data-table th {
    background: #f8fafc;
    font-weight: 800;
    color: #475569;
}

.badge-approved {
    background: #dcfce7;
    color: #166534;
    padding: 4px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 900;
    display: inline-block;
}

.empty-state {
    text-align: center;
    padding: 50px;
    background: white;
    border-radius: 16px;
    color: #999;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 1000;
}

.modal {
    display: flex;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(30,92,60,0.95), rgba(42,138,80,0.97));
    backdrop-filter: blur(12px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    background: white;
    padding: 40px 32px;
    border-radius: 36px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 25px 45px rgba(0,0,0,0.25);
    animation: modalFadeIn 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

@keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.95) translateY(-15px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-content h2 {
    font-size: 1.9rem;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.modal-content input {
    width: 100%;
    padding: 14px 18px;
    margin-bottom: 22px;
    border: 2px solid #e2e8f0;
    border-radius: 40px;
    font-size: 16px;
    text-align: center;
}

.modal-content input:focus {
    border-color: #2a8a50;
    outline: none;
}

.modal-content button:first-of-type {
    background: linear-gradient(135deg, #1e5c3c, #2a8a50);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 40px;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    margin-bottom: 12px;
}

.error-msg {
    color: #e74c3c;
    margin: 10px 0;
    font-size: 0.85rem;
}

@media (max-width: 768px) {
    .filters {
        flex-direction: column;
        align-items: stretch;
    }
    .filters input, .filters button {
        width: 100%;
    }
    .export-buttons {
        margin-left: 0;
        width: 100%;
    }
    .export-buttons button {
        flex: 1;
    }
    .data-table th, .data-table td {
        font-size: 11px;
        padding: 8px 6px;
    }
}
</style>
</head>

<body>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <div style="font-size:3rem; margin-bottom:8px;">🔐</div>
        <h2>Storekeeper Portal</h2>
        <input type="password" id="passwordInput" placeholder="Enter secure password" onkeypress="if(event.key==='Enter') checkPassword()">
        <button onclick="checkPassword()">→ Access Dashboard</button>
        <div id="passwordError" class="error-msg"></div>
        <button type="button" class="return-btn" onclick="returnToDashboard()">← Return to Dashboard</button>
    </div>
</div>

<div id="mainContent" style="display:none;">
    <div class="header">
        <div class="header-content">
            <div class="logo">📦 <span>Storekeeper | Approved Orders</span></div>
            <div class="header-buttons">
                <button class="btn-header archive-btn" onclick="archiveAsPDFAndClear()">📥 Archive as PDF & Clear</button>
                <button class="refresh-btn" onclick="manualRefresh()">🔄</button>
                <button class="btn-header" onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>
    <div class="kitchen-tabs">
        <div class="tabs-container" id="tabsContainer"></div>
    </div>
    <div id="kitchenPagesContainer"></div>
</div>

<script>
const STOREKEEPER_PASSWORD = "store123";
let currentKitchen = "all";
let allApprovedOrders = [];
let filterState = { search: "", dateFrom: "", dateTo: "" };

function getSafeKitchenName(kitchenName) {
    if (!kitchenName || kitchenName === "all") {
        return "all_kitchens";
    }
    let safe = String(kitchenName)
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, '_')
        .trim();
    if (safe === "") return "all_kitchens";
    return safe;
}

function returnToDashboard() {
    window.location.href = "index.html";
}

function checkPassword() {
    const input = document.getElementById("passwordInput");
    if (input.value === STOREKEEPER_PASSWORD) {
        document.getElementById("passwordModal").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
        startRealtimeListener();
        showToast("✅ Login successful");
    } else {
        document.getElementById("passwordError").innerHTML = "Access denied • Incorrect password";
        input.value = '';
        input.focus();
    }
}

function manualRefresh() {
    loadApprovedOrdersOnce();
    showToast("🔄 Refreshing...");
}

function formatDate(dateValue) {
    if (!dateValue) return "N/A";
    let d;
    if (typeof dateValue === "string") d = new Date(dateValue);
    else if (dateValue.seconds) d = new Date(dateValue.seconds * 1000);
    else d = new Date(dateValue);
    if (isNaN(d.getTime())) return "Invalid Date";
    return d.toLocaleString("en-GB", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function formatDateOnly(dateValue) {
    if (!dateValue) return "N/A";
    let d;
    if (typeof dateValue === "string") d = new Date(dateValue);
    else if (dateValue.seconds) d = new Date(dateValue.seconds * 1000);
    else d = new Date(dateValue);
    if (isNaN(d.getTime())) return "Invalid Date";
    return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

function startRealtimeListener() {
    if (!db) {
        console.error("Firebase not initialized");
        showToast("⚠️ Firebase not configured");
        return;
    }
    db.collection("kitchen_requests").onSnapshot(snapshot => {
        allApprovedOrders = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.items && data.items.some(item => item.status === "approved") && !data.archived) {
                allApprovedOrders.push({ id: doc.id, ...data });
            }
        });
        renderTabs();
        renderCurrentKitchen();
    }, error => {
        console.error("Firestore error:", error);
        showToast("⚠️ Firebase connection issue");
    });
}

async function loadApprovedOrdersOnce() {
    if (!db) return;
    const snapshot = await db.collection("kitchen_requests").get();
    allApprovedOrders = [];
    snapshot.forEach(doc => {
        const data = doc.data();
        if (data.items && data.items.some(item => item.status === "approved") && !data.archived) {
            allApprovedOrders.push({ id: doc.id, ...data });
        }
    });
    renderTabs();
    renderCurrentKitchen();
}

function renderTabs() {
    const kitchens = ["all", "Hot Kitchen", "Cold Kitchen", "Pastry / Bakery", "Butchery", "Beach House", "Nihon Kitchen", "Staff Kitchen"];
    const container = document.getElementById("tabsContainer");
    if (!container) return;
    container.innerHTML = "";
    kitchens.forEach(k => {
        const btn = document.createElement("button");
        btn.className = `tab-btn ${currentKitchen === k ? 'active' : ''}`;
        btn.innerHTML = k === "all" ? "📋 All Kitchens" : k;
        btn.onclick = () => { currentKitchen = k; renderTabs(); renderCurrentKitchen(); };
        container.appendChild(btn);
    });
}

function renderCurrentKitchen() {
    let orders = currentKitchen === "all" ? allApprovedOrders : allApprovedOrders.filter(o => o.section === currentKitchen);
    renderKitchenPage(orders);
}

function renderKitchenPage(orders) {
    const container = document.getElementById("kitchenPagesContainer");
    if (!container) return;
    container.innerHTML = `
        <div class="container">
            <div class="card">
                <h3>📋 Approved Orders (${orders.length} active)</h3>
                <div class="filters">
                    <input type="text" id="searchInput" placeholder="Search..." oninput="saveFiltersAndRender()">
                    <input type="date" id="dateFrom" onchange="saveFiltersAndRender()">
                    <input type="date" id="dateTo" onchange="saveFiltersAndRender()">
                    <div class="export-buttons">
                        <button onclick="exportKitchenPDF()">📄 Export PDF</button>
                        <button onclick="exportCSV()">📊 Export CSV</button>
                    </div>
                </div>
                <div id="ordersList"></div>
            </div>
        </div>
    `;
    displayOrders();
}

function saveFiltersAndRender() {
    filterState.search = document.getElementById("searchInput")?.value || "";
    filterState.dateFrom = document.getElementById("dateFrom")?.value || "";
    filterState.dateTo = document.getElementById("dateTo")?.value || "";
    displayOrders();
}

function getOrderDate(order) {
    if (order.submittedAt) {
        if (typeof order.submittedAt === "string") return new Date(order.submittedAt);
        if (order.submittedAt.seconds) return new Date(order.submittedAt.seconds * 1000);
    }
    if (order.timestamp) {
        if (typeof order.timestamp === "number") return new Date(order.timestamp);
        if (order.timestamp.seconds) return new Date(order.timestamp.seconds * 1000);
    }
    return new Date(0);
}

function getFilteredOrders() {
    let filtered = currentKitchen === "all" ? [...allApprovedOrders] : allApprovedOrders.filter(o => o.section === currentKitchen);
    
    if (filterState.search) {
        const search = filterState.search.toLowerCase();
        filtered = filtered.filter(order => {
            if (order.requestId?.toLowerCase().includes(search)) return true;
            return order.items.some(item => item.name?.toLowerCase().includes(search));
        });
    }
    
    if (filterState.dateFrom) {
        const fromDate = new Date(filterState.dateFrom);
        fromDate.setHours(0, 0, 0, 0);
        filtered = filtered.filter(order => getOrderDate(order) >= fromDate);
    }
    
    if (filterState.dateTo) {
        const toDate = new Date(filterState.dateTo);
        toDate.setHours(23, 59, 59, 999);
        filtered = filtered.filter(order => getOrderDate(order) <= toDate);
    }
    return filtered;
}

function displayOrders() {
    const container = document.getElementById("ordersList");
    if (!container) return;
    let filtered = getFilteredOrders();
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 No approved orders</div>';
        return;
    }
    let html = "";
    filtered.forEach(order => {
        const approvedItems = order.items.filter(item => item.status === "approved");
        let total = 0;
        html += `<div class="order-group"><div class="order-header"><div><span class="order-id">📄 ${order.requestId || order.id}</span><span class="kitchen-tag">${order.section || ""}</span></div><div class="order-meta"><span>👨‍🍳 ${order.chefName || ""}</span><span>📅 ${formatDate(order.submittedAt)}</span></div></div><div class="table-wrapper"><table class="data-table"><thead><tr><th>Code</th><th>Item</th><th>Qty</th><th>Unit</th><th>Price</th><th>Total</th><th>Approved By</th></tr></thead><tbody>`;
        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const rowTotal = qty * price;
            total += rowTotal;
            html += `<tr><td style="font-family:monospace;">${item.code || ""}</td><td><strong>${escapeHtml(item.name)}</strong></td><td>${qty}</td><td>${item.unit || ""}</td><td class="text-right">${price.toFixed(2)}</td><td class="text-right">${rowTotal.toFixed(2)}</td><td class="text-center"><span class="badge-approved">✔ ${item.approvedBy || ""}</span></td></tr>`;
        });
        html += `</tbody></table></div><div style="padding:10px 15px; background:#f0fdf4; text-align:right;"><span class="order-total">💰 Order Total: ${total.toFixed(2)} EGP</span></div></div>`;
    });
    container.innerHTML = html;
}

async function exportKitchenPDF() {
    let filtered = getFilteredOrders();
    filtered = filtered.filter(order => order.items.some(item => item.status === "approved"));
    
    if (filtered.length === 0) {
        showToast("No data to export");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    
    let kitchenDisplayName = currentKitchen === "all" ? "All Kitchens" : currentKitchen;
    let kitchenSafeName = getSafeKitchenName(currentKitchen);
    
    const today = new Date().toISOString().slice(0, 10);
    const filename = `${kitchenSafeName}_report_${today}.pdf`;
    
    const pageWidth = doc.internal.pageSize.getWidth();
    const left = 14;
    const right = 14;
    
    let grandTotal = 0;
    let totalItems = 0;
    
    filtered.forEach(order => {
        order.items.filter(i => i.status === "approved").forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            totalItems += qty;
            grandTotal += qty * (item.price || 0);
        });
    });
    
    function drawHeader(pageNo) {
        doc.setFillColor(30, 92, 60);
        doc.rect(0, 0, pageWidth, 24, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);
        doc.text("KITCHEN ORDERS REPORT", left, 14);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(`Kitchen: ${kitchenDisplayName}`, left, 20);
        doc.text(new Date().toLocaleString(), pageWidth - 65, 20);
        
        doc.setDrawColor(220);
        doc.line(left, 285, pageWidth - right, 285);
        doc.setFontSize(8);
        doc.setTextColor(120);
        doc.text("Storekeeper Dashboard • Kitchen Orders", left, 290);
        doc.text(`Page ${pageNo}`, pageWidth - 24, 290);
    }
    
    drawHeader(1);
    let y = 34;
    
    doc.setFillColor(242, 248, 243);
    doc.roundedRect(left, y, 182, 28, 4, 4, "F");
    doc.setTextColor(30, 92, 60);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text("REPORT SUMMARY", left + 5, y + 8);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`Total Orders: ${filtered.length}`, left + 5, y + 18);
    doc.text(`Total Items: ${totalItems}`, left + 65, y + 18);
    doc.text(`Grand Total: ${grandTotal.toFixed(2)} EGP`, left + 115, y + 18);
    y += 40;
    
    for (let idx = 0; idx < filtered.length; idx++) {
        const order = filtered[idx];
        const approvedItems = order.items.filter(item => item.status === "approved");
        if (approvedItems.length === 0) continue;
        
        if (y > 230) {
            doc.addPage();
            drawHeader(doc.internal.getNumberOfPages());
            y = 34;
        }
        
        doc.setFillColor(245, 248, 250);
        doc.roundedRect(left, y, 182, 14, 3, 3, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(30, 92, 60);
        doc.text(`${idx + 1}. ${order.requestId || order.id}`, left + 4, y + 9);
        y += 19;
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(110);
        doc.text(`Kitchen: ${order.section || "N/A"}`, left, y);
        doc.text(`Chef: ${order.chefName || "N/A"}`, left + 70, y);
        doc.text(`Date: ${formatDateOnly(order.submittedAt)}`, left + 130, y);
        y += 6;
        
        let tableData = [];
        let orderTotal = 0;
        
        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const total = qty * price;
            orderTotal += total;
            tableData.push([
                item.code || "-",
                (item.name || "-").length > 35 ? item.name.substring(0, 32) + "..." : item.name || "-",
                qty,
                item.unit || "-",
                price.toFixed(2),
                total.toFixed(2),
                item.approvedBy || "-"
            ]);
        });
        
        doc.autoTable({
            startY: y,
            head: [["Code", "Item", "Qty", "Unit", "Price", "Total", "Approved By"]],
            body: tableData,
            theme: "grid",
            margin: { left: left, right: right },
            styles: { fontSize: 8, cellPadding: 3, valign: "middle" },
            headStyles: { fillColor: [30, 92, 60], textColor: [255, 255, 255], fontStyle: "bold", halign: "center" },
            alternateRowStyles: { fillColor: [248, 250, 248] },
            columnStyles: {
                0: { cellWidth: 18, halign: "center" },
                1: { cellWidth: 58 },
                2: { cellWidth: 14, halign: "center" },
                3: { cellWidth: 16, halign: "center" },
                4: { cellWidth: 22, halign: "right" },
                5: { cellWidth: 24, halign: "right" },
                6: { cellWidth: 28, halign: "center" }
            }
        });
        
        y = doc.lastAutoTable.finalY + 6;
        
        doc.setFillColor(255, 248, 220);
        doc.roundedRect(pageWidth - 74, y, 60, 10, 2, 2, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(120, 90, 20);
        doc.text(`Total: ${orderTotal.toFixed(2)} EGP`, pageWidth - 68, y + 6.5);
        y += 18;
    }
    
    if (y > 240) {
        doc.addPage();
        drawHeader(doc.internal.getNumberOfPages());
        y = 40;
    }
    
    doc.setDrawColor(220);
    doc.line(left, y, pageWidth - right, y);
    y += 12;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.setTextColor(30, 92, 60);
    doc.text(`FINAL GRAND TOTAL: ${grandTotal.toFixed(2)} EGP`, left, y);
    y += 12;
    doc.setFont("helvetica", "italic");
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text("Automatically generated by Storekeeper Dashboard", left, y);
    
    doc.save(filename);
    showToast(`📄 PDF Exported: ${filename}`);
}

async function archiveAsPDFAndClear() {
    if (allApprovedOrders.length === 0) {
        showToast("No orders to archive");
        return;
    }
    
    if (!confirm(`📦 Archive ${allApprovedOrders.length} orders as PDF?\n\nThis will:\n1. Create a PDF archive report\n2. Download the PDF\n3. Clear all orders from database\n\nProceed?`)) return;
    
    showToast("📄 Creating PDF archive...");
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    
    let kitchenDisplayName = currentKitchen === "all" ? "All Kitchens" : currentKitchen;
    let kitchenSafeName = getSafeKitchenName(currentKitchen);
    
    const today = new Date().toISOString().slice(0, 10);
    const filename = `${kitchenSafeName}_archive_${today}.pdf`;
    
    const pageWidth = doc.internal.pageSize.getWidth();
    const left = 14;
    const right = 14;
    
    let grandTotal = 0;
    let totalItems = 0;
    
    allApprovedOrders.forEach(order => {
        order.items.filter(i => i.status === "approved").forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            totalItems += qty;
            grandTotal += qty * (item.price || 0);
        });
    });
    
    function drawArchiveHeader(pageNo) {
        doc.setFillColor(30, 92, 60);
        doc.rect(0, 0, pageWidth, 24, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(20);
        doc.text("KITCHEN ORDERS ARCHIVE", left, 14);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.text(`Kitchen: ${kitchenDisplayName}`, left, 20);
        doc.text(new Date().toLocaleString(), pageWidth - 65, 20);
        
        doc.setDrawColor(220);
        doc.line(left, 285, pageWidth - right, 285);
        doc.setFontSize(8);
        doc.setTextColor(120);
        doc.text("Storekeeper Dashboard • Kitchen Orders Archive", left, 290);
        doc.text(`Page ${pageNo}`, pageWidth - 24, 290);
    }
    
    drawArchiveHeader(1);
    let y = 34;
    
    doc.setFillColor(242, 248, 243);
    doc.roundedRect(left, y, 182, 28, 4, 4, "F");
    doc.setTextColor(30, 92, 60);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text("ARCHIVE SUMMARY", left + 5, y + 8);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text(`Total Orders: ${allApprovedOrders.length}`, left + 5, y + 18);
    doc.text(`Total Items: ${totalItems}`, left + 65, y + 18);
    doc.text(`Grand Total: ${grandTotal.toFixed(2)} EGP`, left + 115, y + 18);
    y += 40;
    
    for (let idx = 0; idx < allApprovedOrders.length; idx++) {
        const order = allApprovedOrders[idx];
        const approvedItems = order.items.filter(item => item.status === "approved");
        if (approvedItems.length === 0) continue;
        
        if (y > 230) {
            doc.addPage();
            drawArchiveHeader(doc.internal.getNumberOfPages());
            y = 34;
        }
        
        doc.setFillColor(245, 248, 250);
        doc.roundedRect(left, y, 182, 14, 3, 3, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.setTextColor(30, 92, 60);
        doc.text(`${idx + 1}. ${order.requestId || order.id}`, left + 4, y + 9);
        y += 19;
        
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(110);
        doc.text(`Kitchen: ${order.section || "N/A"}`, left, y);
        doc.text(`Chef: ${order.chefName || "N/A"}`, left + 70, y);
        doc.text(`Date: ${formatDateOnly(order.submittedAt)}`, left + 130, y);
        y += 6;
        
        let tableData = [];
        let orderTotal = 0;
        
        approvedItems.forEach(item => {
            const qty = item.approvedQty || item.originalQty || 0;
            const price = item.price || 0;
            const total = qty * price;
            orderTotal += total;
            tableData.push([
                item.code || "-",
                (item.name || "-").length > 35 ? item.name.substring(0, 32) + "..." : item.name || "-",
                qty,
                item.unit || "-",
                price.toFixed(2),
                total.toFixed(2),
                item.approvedBy || "-"
            ]);
        });
        
        doc.autoTable({
            startY: y,
            head: [["Code", "Item", "Qty", "Unit", "Price", "Total", "Approved By"]],
            body: tableData,
            theme: "grid",
            margin: { left: left, right: right },
            styles: { fontSize: 8, cellPadding: 3 },
            headStyles: { fillColor: [30, 92, 60], textColor: [255, 255, 255], fontStyle: "bold" },
            alternateRowStyles: { fillColor: [248, 250, 248] },
            columnStyles: {
                0: { cellWidth: 18, halign: "center" },
                1: { cellWidth: 58 },
                2: { cellWidth: 14, halign: "center" },
                3: { cellWidth: 16, halign: "center" },
                4: { cellWidth: 22, halign: "right" },
                5: { cellWidth: 24, halign: "right" },
                6: { cellWidth: 28, halign: "center" }
            }
        });
        
        y = doc.lastAutoTable.finalY + 6;
        
        doc.setFillColor(255, 248, 220);
        doc.roundedRect(pageWidth - 74, y, 60, 10, 2, 2, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(10);
        doc.setTextColor(120, 90, 20);
        doc.text(`Total: ${orderTotal.toFixed(2)} EGP`, pageWidth - 68, y + 6.5);
        y += 18;
    }
    
    if (y > 240) {
        doc.addPage();
        drawArchiveHeader(doc.internal.getNumberOfPages());
        y = 40;
    }
    
    doc.setDrawColor(220);
    doc.line(left, y, pageWidth - right, y);
    y += 12;
    doc.setFont("helvetica", "bold");
    doc.setFontSize(16);
    doc.setTextColor(30, 92, 60);
    doc.text(`ARCHIVE GRAND TOTAL: ${grandTotal.toFixed(2)} EGP`, left, y);
    
    doc.save(filename);
    showToast(`✅ PDF Archive: ${filename}`);
    
    setTimeout(async () => {
        if (confirm("PDF archive created! Clear all orders from database now?")) {
            await clearAllOrdersFromDatabase();
        }
    }, 1000);
}

async function clearAllOrdersFromDatabase() {
    if (!db) return;
    if (allApprovedOrders.length === 0) return;
    showToast("🗑️ Clearing orders from database...");
    let success = 0, fail = 0;
    for (let order of allApprovedOrders) {
        try {
            await db.collection("kitchen_requests").doc(order.id).delete();
            success++;
        } catch (err) { fail++; }
    }
    showToast(`✅ Cleared ${success} orders${fail ? `, ${fail} failed` : ''}`);
    setTimeout(() => startRealtimeListener(), 500);
}

function exportCSV() {
    let filtered = getFilteredOrders();
    let csv = "Request ID,Kitchen,Chef,Item Code,Item Name,Qty,Unit,Price,Total,Approved By,Date\n";
    filtered.forEach(order => {
        order.items.forEach(item => {
            if (item.status === "approved") {
                const qty = item.approvedQty || item.originalQty || 0;
                const price = item.price || 0;
                const total = qty * price;
                csv += `"${order.requestId}","${order.section}","${order.chefName}","${item.code || ""}","${item.name}",${qty},"${item.unit || ""}",${price},${total},"${item.approvedBy || ""}","${formatDateOnly(order.submittedAt)}"\n`;
            }
        });
    });
    
    let kitchenSafeName = getSafeKitchenName(currentKitchen);
    const today = new Date().toISOString().slice(0, 10);
    downloadCSV(csv, `${kitchenSafeName}_report_${today}.csv`);
    showToast("📊 CSV Exported");
}

function downloadCSV(csvText, filename) {
    const blob = new Blob(["\uFEFF" + csvText], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
}

function showToast(msg) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('passwordInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });
});

window.onload = () => {
    document.getElementById("passwordModal").style.display = "flex";
};
