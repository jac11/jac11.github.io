<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Kitchen Order System - Welcome</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { max-width: 1200px; width: 100%; }
.welcome-card { background: white; border-radius: 30px; padding: 50px 40px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: fadeInUp 0.6s ease; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.logo { font-size: 4rem; margin-bottom: 20px; }
h1 { font-size: 2.5rem; color: #1e3c72; margin-bottom: 10px; }
.subtitle { color: #666; font-size: 1.1rem; margin-bottom: 40px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; }
.buttons-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
.dashboard-btn { background: white; border: none; border-radius: 20px; padding: 30px 20px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
.dashboard-btn:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
.btn-icon { font-size: 3rem; margin-bottom: 15px; }
.dashboard-btn h3 { font-size: 1.5rem; margin-bottom: 10px; }
.dashboard-btn p { color: #666; font-size: 0.85rem; line-height: 1.4; }
.btn-chef { border-top: 5px solid #3498db; }
.btn-admin { border-top: 5px solid #e94560; }
.btn-store { border-top: 5px solid #27ae60; }
.info-section { background: #f8f9fa; border-radius: 20px; padding: 25px; margin-top: 20px; }
.info-section h4 { color: #1e3c72; margin-bottom: 15px; font-size: 1.1rem; }
.stats-row { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat-item { text-align: center; }
.stat-number { font-size: 2rem; font-weight: bold; color: #e94560; }
.stat-label { font-size: 0.8rem; color: #666; font-weight: 500; }
.stat-accepted .stat-number { color: #8e44ad; }
.price-stat { background: linear-gradient(135deg, #1e3c72, #2a5298); border-radius: 15px; padding: 15px 20px; margin-top: 20px; }
.price-stat .stat-number { color: #ffd700; font-size: 1.5rem; }
.price-stat .stat-label { color: rgba(255,255,255,0.9); }
.footer { margin-top: 30px; color: rgba(255,255,255,0.7); text-align: center; font-size: 0.8rem; }
@media (max-width: 768px) {
    .welcome-card { padding: 30px 20px; }
    h1 { font-size: 1.8rem; }
    .buttons-grid { grid-template-columns: 1fr; gap: 15px; }
    .dashboard-btn { padding: 20px; }
    .btn-icon { font-size: 2rem; }
    .dashboard-btn h3 { font-size: 1.2rem; }
    .stats-row { gap: 20px; }
    .stat-number { font-size: 1.5rem; }
}
</style>
</head>
<body>
<div class="container">
    <div class="welcome-card">
        <div class="logo">🍳</div>
        <h1>Kitchen Order System</h1>
        <div class="subtitle">Complete Kitchen Management Solution</div>
        <div class="buttons-grid">
            <button class="dashboard-btn btn-chef" onclick="location.href='chef.html'">
                <div class="btn-icon">👨‍🍳</div>
                <h3>Chef Dashboard</h3>
                <p>Submit kitchen orders, request items, track approvals with price calculation</p>
            </button>
            <button class="dashboard-btn btn-admin" onclick="location.href='admin.html'">
                <div class="btn-icon">👑</div>
                <h3>Admin Dashboard</h3>
                <p>Approve/reject orders, modify quantities, manage inventory with price tracking</p>
            </button>
            <button class="dashboard-btn btn-store" onclick="location.href='storekeeper.html'">
                <div class="btn-icon">📦</div>
                <h3>Storekeeper Dashboard</h3>
                <p>View final approved orders with prices, export reports, print summaries</p>
            </button>
        </div>
        <div class="info-section">
            <h4>📊 System Overview</h4>
            <div class="stats-row" id="systemStats">
                <div class="stat-item"><div class="stat-number" id="totalRequests">0</div><div class="stat-label">Total Requests</div></div>
                <div class="stat-item"><div class="stat-number" id="pendingRequests">0</div><div class="stat-label">Pending</div></div>
                <div class="stat-item"><div class="stat-number" id="approvedRequests">0</div><div class="stat-label">Approved</div></div>
                <div class="stat-item"><div class="stat-number" id="rejectedRequests">0</div><div class="stat-label">Rejected</div></div>
                <div class="stat-item stat-accepted"><div class="stat-number" id="acceptedRequests">0</div><div class="stat-label">Accepted</div></div>
            </div>
            <div class="price-stat" id="priceStats">
                <div class="stats-row">
                    <div class="stat-item"><div class="stat-number" id="totalValue">0</div><div class="stat-label">💰 Total Value (EGP)</div></div>
                    <div class="stat-item"><div class="stat-number" id="approvedValue">0</div><div class="stat-label">✅ Approved Value (EGP)</div></div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer"><p>Kitchen Order System © 2025 | Real-time sync | Price tracking included</p></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
let allRequests = [];

function getRequestStatus(items) {
    if(!items || items.length === 0) return "pending";
    
    let approvedCount = 0;
    let rejectedCount = 0;
    let pendingCount = 0;
    
    items.forEach(item => {
        if(item.status === "approved") {
            approvedCount++;
        } else if(item.status === "rejected") {
            rejectedCount++;
        } else {
            pendingCount++;
        }
    });
    
    if(approvedCount === items.length && approvedCount > 0) return "approved";
    if(rejectedCount === items.length && rejectedCount > 0) return "rejected";
    if(approvedCount > 0 && rejectedCount > 0) return "accepted";
    if(pendingCount > 0) return "pending";
    
    return "pending";
}

async function loadStats() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allRequests = [];
        snapshot.forEach(doc => { 
            allRequests.push({ id: doc.id, ...doc.data() }); 
        });
        
        let total = allRequests.length;
        let pending = 0, approved = 0, rejected = 0, accepted = 0;
        let totalValue = 0;
        let approvedValue = 0;
        
        allRequests.forEach(req => {
            const status = getRequestStatus(req.items);
            
            if(status === "pending") pending++;
            else if(status === "approved") approved++;
            else if(status === "rejected") rejected++;
            else if(status === "accepted") accepted++;
            
            if(req.items && req.items.length > 0) {
                req.items.forEach(item => {
                    const price = item.price || 0;
                    const qty = item.originalQty || 0;
                    totalValue += qty * price;
                    
                    if(item.status === "approved") {
                        const approvedQty = item.approvedQty || qty;
                        approvedValue += approvedQty * price;
                    }
                });
            }
        });
        
        document.getElementById("totalRequests").innerText = total;
        document.getElementById("pendingRequests").innerText = pending;
        document.getElementById("approvedRequests").innerText = approved;
        document.getElementById("rejectedRequests").innerText = rejected;
        document.getElementById("acceptedRequests").innerText = accepted;
        document.getElementById("totalValue").innerHTML = totalValue.toFixed(2);
        document.getElementById("approvedValue").innerHTML = approvedValue.toFixed(2);
        
    } catch(e) { 
        console.error("Error loading stats:", e); 
        document.getElementById("totalRequests").innerText = "?";
    }
}

// Load stats on page load
loadStats();

// Listen for real-time changes from Firebase
db.collection("kitchen_requests").onSnapshot(() => {
    console.log("Real-time change detected, reloading stats...");
    loadStats();
});

// Auto-refresh every 5 seconds (backup for real-time sync)
setInterval(loadStats, 5000);
</script>
</body>
</html>
