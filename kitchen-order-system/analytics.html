<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Analytics Dashboard - Kitchen Orders</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
}

.header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: white;
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-content {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.header h1 {
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.header span {
    color: #e94560;
}

.btn-back {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 16px;
    border-radius: 25px;
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px;
}

/* Stats Grid - 2 columns on mobile */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.stat-card {
    background: white;
    padding: 14px;
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.stat-number {
    font-size: 1.8rem;
    font-weight: bold;
    color: #e94560;
}

.stat-label {
    color: #666;
    margin-top: 4px;
    font-size: 0.7rem;
    text-transform: uppercase;
}

/* Charts Grid - Single column on mobile */
.charts-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 20px;
}

.chart-card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.chart-card h3 {
    margin-bottom: 15px;
    color: #1e3c72;
    border-left: 4px solid #3498db;
    padding-left: 10px;
    font-size: 0.95rem;
}

.chart-container {
    position: relative;
    height: 220px;
}

/* Table Card */
.table-card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-top: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.table-card h3 {
    margin-bottom: 15px;
    color: #1e3c72;
    border-left: 4px solid #3498db;
    padding-left: 10px;
    font-size: 0.95rem;
}

/* Table - Horizontal Scroll */
.table-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

.details-table {
    min-width: 500px;
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

.details-table th, .details-table td {
    padding: 10px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

.details-table th {
    background: #f8f9fa;
    font-weight: 600;
}

/* Filters */
.filters {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    background: white;
    padding: 16px;
    border-radius: 16px;
    align-items: center;
}

.filters label {
    font-weight: 600;
    color: #555;
    font-size: 0.75rem;
}

.filters select, .filters input {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 13px;
    flex: 1;
    min-width: 100px;
}

.filters button {
    background: #3498db;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
}

.sync-status {
    font-size: 11px;
    text-align: center;
    margin-top: 16px;
    padding: 8px;
    border-radius: 20px;
    background: #e8f5e9;
    color: #27ae60;
}

@media (min-width: 768px) {
    .stats-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
    }
    
    .charts-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }
    
    .stat-number {
        font-size: 2rem;
    }
    
    .chart-container {
        height: 280px;
    }
}

@media (max-width: 480px) {
    .filters {
        flex-direction: column;
        align-items: stretch;
    }
    
    .filters select, .filters input, .filters button {
        width: 100%;
    }
    
    .stat-number {
        font-size: 1.5rem;
    }
    
    .chart-container {
        height: 200px;
    }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <h1>📊 Analytics <span>| Kitchen Orders</span></h1>
        <button class="btn-back" onclick="window.location.href='admin.html'">← Back</button>
    </div>
</div>

<div class="container">
    <div class="filters">
        <label>📅 From:</label>
        <input type="date" id="dateFrom">
        <label>📅 To:</label>
        <input type="date" id="dateTo">
        <label>🍽️ Kitchen:</label>
        <select id="kitchenFilter">
            <option value="all">All Kitchens</option>
            <option value="Hot Kitchen">🔥 Hot Kitchen</option>
            <option value="Cold Kitchen">❄️ Cold Kitchen</option>
            <option value="Pastry">🍰 Pastry</option>
            <option value="Butchery">🥩 Butchery</option>
            <option value="Beach House">🏖️ Beach House</option>
            <option value="Nihon Kitchen">🍜 Nihon Kitchen</option>
            <option value="Staff Kitchen">👥 Staff Kitchen</option>
        </select>
        <button onclick="refreshAnalytics()">🔄 Update</button>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>📦 Top Requested Items</h3>
            <div class="chart-container">
                <canvas id="topItemsChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>🍽️ Requests by Kitchen</h3>
            <div class="chart-container">
                <canvas id="kitchenChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>✅ Approval Status</h3>
            <div class="chart-container">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>📈 Requests Over Time</h3>
            <div class="chart-container">
                <canvas id="timelineChart"></canvas>
            </div>
        </div>
    </div>

    <div class="table-card">
        <h3>📋 Detailed Item Report</h3>
        <div class="table-wrapper">
            <table class="details-table" id="detailsTable">
                <thead>
                    <tr><th>Item Name</th><th>Requested</th><th>Approved</th><th>Rejected</th><th>Rate</th></tr>
                </thead>
                <tbody id="detailsTableBody"></tbody>
            </table>
        </div>
    </div>
    <div class="sync-status" id="syncStatus">🔄 Loading data...</div>
</div>

<script>
let topItemsChart, kitchenChart, statusChart, timelineChart;
let allRequests = [];

async function loadRequests() {
    try {
        const snapshot = await db.collection("kitchen_requests").get();
        allRequests = [];
        snapshot.forEach(doc => { allRequests.push({ id: doc.id, ...doc.data() }); });
        document.getElementById("syncStatus").innerHTML = "✅ Connected • " + allRequests.length + " orders";
        document.getElementById("syncStatus").style.background = "#e8f5e9";
        refreshAnalytics();
    } catch (error) {
        document.getElementById("syncStatus").innerHTML = "⚠️ Offline mode";
        document.getElementById("syncStatus").style.background = "#fee2e2";
        document.getElementById("syncStatus").style.color = "#e74c3c";
    }
}

function filterData(requests) {
    const kitchenFilter = document.getElementById("kitchenFilter").value;
    const dateFrom = document.getElementById("dateFrom").value;
    const dateTo = document.getElementById("dateTo").value;
    
    let filtered = [...requests];
    
    if(kitchenFilter !== "all") {
        filtered = filtered.filter(r => r.section === kitchenFilter);
    }
    
    if(dateFrom) {
        filtered = filtered.filter(r => new Date(r.submittedAt) >= new Date(dateFrom));
    }
    if(dateTo) {
        const endDate = new Date(dateTo);
        endDate.setHours(23, 59, 59);
        filtered = filtered.filter(r => new Date(r.submittedAt) <= endDate);
    }
    
    return filtered;
}

function refreshAnalytics() {
    const filtered = filterData(allRequests);
    updateStats(filtered);
    updateTopItemsChart(filtered);
    updateKitchenChart(filtered);
    updateStatusChart(filtered);
    updateTimelineChart(filtered);
    updateDetailsTable(filtered);
}

function updateStats(requests) {
    let totalRequests = requests.length;
    let totalItems = 0;
    let totalApproved = 0;
    let totalRejected = 0;
    
    requests.forEach(req => {
        req.items.forEach(item => {
            totalItems += item.originalQty;
            if(item.status === "approved") totalApproved += item.approvedQty || 0;
            if(item.status === "rejected") totalRejected += item.originalQty;
        });
    });
    
    document.getElementById("statsGrid").innerHTML = `
        <div class="stat-card"><div class="stat-number">${totalRequests}</div><div class="stat-label">Requests</div></div>
        <div class="stat-card"><div class="stat-number">${totalItems}</div><div class="stat-label">Items</div></div>
        <div class="stat-card"><div class="stat-number">${totalApproved}</div><div class="stat-label">Approved</div></div>
        <div class="stat-card"><div class="stat-number">${totalRejected}</div><div class="stat-label">Rejected</div></div>
    `;
}

function updateTopItemsChart(requests) {
    const itemMap = new Map();
    requests.forEach(req => {
        req.items.forEach(item => {
            const current = itemMap.get(item.name) || 0;
            itemMap.set(item.name, current + item.originalQty);
        });
    });
    
    const sorted = Array.from(itemMap.entries()).sort((a,b) => b[1] - a[1]).slice(0, 6);
    const labels = sorted.map(i => i[0].length > 15 ? i[0].substring(0, 15) + "..." : i[0]);
    const data = sorted.map(i => i[1]);
    
    if(topItemsChart) topItemsChart.destroy();
    const ctx = document.getElementById('topItemsChart').getContext('2d');
    topItemsChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: 'Quantity', data: data, backgroundColor: '#3498db', borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
    });
}

function updateKitchenChart(requests) {
    const kitchenMap = new Map();
    requests.forEach(req => {
        const current = kitchenMap.get(req.section) || 0;
        kitchenMap.set(req.section, current + 1);
    });
    
    const labels = Array.from(kitchenMap.keys());
    const data = Array.from(kitchenMap.values());
    const colors = ['#e74c3c', '#3498db', '#f39c12', '#8e44ad', '#1abc9c', '#e91e63', '#95a5a6'];
    
    if(kitchenChart) kitchenChart.destroy();
    const ctx = document.getElementById('kitchenChart').getContext('2d');
    kitchenChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: colors.slice(0, labels.length), borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
    });
}

function updateStatusChart(requests) {
    let approved = 0, rejected = 0, pending = 0;
    requests.forEach(req => {
        req.items.forEach(item => {
            if(item.status === "approved") approved++;
            else if(item.status === "rejected") rejected++;
            else pending++;
        });
    });
    
    if(statusChart) statusChart.destroy();
    const ctx = document.getElementById('statusChart').getContext('2d');
    statusChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: ['✅ Approved', '❌ Rejected', '⏳ Pending'], datasets: [{ data: [approved, rejected, pending], backgroundColor: ['#27ae60', '#e74c3c', '#f39c12'], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

function updateTimelineChart(requests) {
    const dateMap = new Map();
    requests.forEach(req => {
        const date = req.submittedAt.split(',')[0];
        const current = dateMap.get(date) || 0;
        dateMap.set(date, current + 1);
    });
    
    const sorted = Array.from(dateMap.entries()).sort((a,b) => new Date(a[0]) - new Date(b[0]));
    const labels = sorted.map(d => d[0]);
    const data = sorted.map(d => d[1]);
    
    if(timelineChart) timelineChart.destroy();
    const ctx = document.getElementById('timelineChart').getContext('2d');
    timelineChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [{ label: 'Requests', data: data, borderColor: '#e94560', backgroundColor: 'rgba(233,69,96,0.1)', fill: true, tension: 0.3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } } }
    });
}

function updateDetailsTable(requests) {
    const itemMap = new Map();
    requests.forEach(req => {
        req.items.forEach(item => {
            if(!itemMap.has(item.name)) {
                itemMap.set(item.name, { requested: 0, approved: 0, rejected: 0 });
            }
            const stats = itemMap.get(item.name);
            stats.requested += item.originalQty;
            if(item.status === "approved") stats.approved += item.approvedQty || 0;
            if(item.status === "rejected") stats.rejected += item.originalQty;
        });
    });
    
    const sorted = Array.from(itemMap.entries()).sort((a,b) => b[1].requested - a[1].requested);
    const tbody = document.getElementById("detailsTableBody");
    tbody.innerHTML = "";
    if(sorted.length === 0) {
        tbody.innerHTML = '<td><td colspan="5" style="text-align:center;">No data</td></tr>';
    } else {
        sorted.forEach(([name, stats]) => {
            const rate = stats.requested > 0 ? ((stats.approved / stats.requested) * 100).toFixed(1) : 0;
            tbody.innerHTML += `
                <tr>
                    <td><strong>${name}</strong></td>
                    <td>${stats.requested}</td>
                    <td style="color:#27ae60;">${stats.approved}</td>
                    <td style="color:#e74c3c;">${stats.rejected}</td>
                    <td style="color:#3498db;">${rate}%</td>
                </tr>
            `;
        });
    }
}

function setDefaultDates() {
    const to = new Date();
    const from = new Date();
    from.setDate(from.getDate() - 30);
    document.getElementById("dateTo").value = to.toISOString().split('T')[0];
    document.getElementById("dateFrom").value = from.toISOString().split('T')[0];
}

setDefaultDates();
loadRequests();
setInterval(loadRequests, 10000);
</script>
</body>
</html>
