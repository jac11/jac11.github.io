  function showSection(sectionId) {
    document.querySelectorAll('.section-content').forEach(section => {
      section.classList.add('hidden-section');
    });
    const targetSection = document.getElementById(`${sectionId}-section`);
    if (targetSection) targetSection.classList.remove('hidden-section');
    
    document.querySelectorAll('.nav-card').forEach(card => {
      card.classList.remove('active');
      if (card.getAttribute('data-section') === sectionId) {
        card.classList.add('active');
      }
    });
    
    currentSection = sectionId;
    if (sectionId === 'analytics') {
      loadAnalyticsData();
    }
  }

  document.querySelectorAll('.nav-card').forEach(card => {
    card.addEventListener('click', () => {
      const section = card.getAttribute('data-section');
      if (section === 'reset') showSection('reset');
      else if (section === 'analytics') showSection('analytics');
      else showSection(section);
    });
  });

  // Auto-calculate total for each section
  function setupAutoTotal(foodId, bevId, totalId) {
    const foodInput = document.getElementById(foodId);
    const bevInput = document.getElementById(bevId);
    const totalInput = document.getElementById(totalId);
    function update() {
      const foodVal = parseFloat(foodInput.value);
      const bevVal = parseFloat(bevInput.value);
      const isValidFood = !isNaN(foodVal) && foodVal > 0;
      const isValidBev = !isNaN(bevVal) && bevVal > 0;
      if (isValidFood && isValidBev) {
        totalInput.value = foodVal + bevVal;
        totalInput.disabled = false;
      } else {
        totalInput.value = "";
        totalInput.disabled = true;
      }
    }
    foodInput.addEventListener('input', update);
    bevInput.addEventListener('input', update);
  }

  setupAutoTotal('restFood', 'restBev', 'restTotal');
  setupAutoTotal('roomFood', 'roomBev', 'roomTotal');
  setupAutoTotal('beachFood', 'beachBev', 'beachTotal');
  setupAutoTotal('nihonFood', 'nihonBev', 'nihonTotal');

  // Save report with OVERWRITE logic
  async function saveReport(restaurantName, data) {
    try {
      const today = new Date().toISOString().split('T')[0];
      
      const q = query(
        collection(db, "dailyReports"),
        where("restaurant", "==", restaurantName),
        where("manager", "==", data.manager),
        where("date", "==", today)
      );
      
      const snapshot = await getDocs(q);
      let isOverwrite = false;
      
      if (!snapshot.empty) {
        for (const docSnap of snapshot.docs) {
          await deleteDoc(docSnap.ref);
          isOverwrite = true;
        }
      }
      
      await addDoc(collection(db, "dailyReports"), {
        restaurant: restaurantName,
        manager: data.manager,
        covers: data.covers,
        foodRevenue: data.food,
        beverageRevenue: data.bev,
        totalRevenue: data.food + data.bev,
        createdAt: serverTimestamp(),
        date: today
      });
      
      if (isOverwrite) {
        showMessage(`🔄 UPDATED: ${restaurantName} (${data.manager}) | ${data.covers} covers | Total: ${data.food + data.bev} EGP`, false);
      } else {
        showMessage(`✅ SAVED: ${restaurantName} | ${data.covers} covers | Total: ${data.food + data.bev} EGP`, false);
      }
      return true;
    } catch (error) {
      showMessage("❌ Firebase error: " + error.message, true);
      return false;
    }
  }

  // NEW: Fix last entry function (within 5 minutes)
  async function fixLastEntry(restaurantName, newData) {
    try {
      // Get the last 5 minutes timestamp
      const fiveMinsAgo = new Date();
      fiveMinsAgo.setMinutes(fiveMinsAgo.getMinutes() - 5);
      
      // Query the most recent entry for this restaurant in last 5 minutes
      const q = query(
        collection(db, "dailyReports"),
        where("restaurant", "==", restaurantName),
        orderBy("createdAt", "desc"),
        limit(1)
      );
      
      const snapshot = await getDocs(q);
      
      if (snapshot.empty) {
        showMessage(`❌ No recent entry found for ${restaurantName} to fix`, true);
        return false;
      }
      
      const lastEntry = snapshot.docs[0];
      const lastEntryData = lastEntry.data();
      const lastEntryTime = lastEntryData.createdAt?.toDate();
      
      if (!lastEntryTime) {
        showMessage("❌ Cannot determine entry time", true);
        return false;
      }
      
      const now = new Date();
      const diffMinutes = (now - lastEntryTime) / 1000 / 60;
      
      if (diffMinutes > 5) {
        showMessage(`⏰ Cannot fix: Last entry was ${diffMinutes.toFixed(1)} minutes ago (only allowed within 5 minutes)`, true);
        return false;
      }
      
      // Delete the old entry
      await deleteDoc(lastEntry.ref);
      
      // Insert the corrected entry
      await addDoc(collection(db, "dailyReports"), {
        restaurant: restaurantName,
        manager: newData.manager,
        covers: newData.covers,
        foodRevenue: newData.food,
        beverageRevenue: newData.bev,
        totalRevenue: newData.food + newData.bev,
        createdAt: serverTimestamp(),
        date: new Date().toISOString().split('T')[0]
      });
      
      showMessage(`🔧 FIXED: ${restaurantName} entry from ${diffMinutes.toFixed(1)} min ago | New total: ${newData.food + newData.bev} EGP`, false);
      return true;
      
    } catch (error) {
      showMessage("❌ Fix failed: " + error.message, true);
      return false;
    }
  }

  // Add Fix buttons dynamically
  function addFixButtons() {
    const sections = [
      { id: 'rest', name: 'The Restaurant', managerId: 'restManager', coversId: 'restCovers', foodId: 'restFood', bevId: 'restBev' },
      { id: 'room', name: 'Room Service', managerId: 'roomManager', coversId: 'roomCovers', foodId: 'roomFood', bevId: 'roomBev' },
      { id: 'beach', name: 'The Beach House', managerId: 'beachManager', coversId: 'beachCovers', foodId: 'beachFood', bevId: 'beachBev' },
      { id: 'nihon', name: 'Nihon', managerId: 'nihonManager', coversId: 'nihonCovers', foodId: 'nihonFood', bevId: 'nihonBev' }
    ];
    
    sections.forEach(section => {
      const saveBtn = document.querySelector(`[data-save="${section.name}"]`);
      if (saveBtn && !saveBtn.nextElementSibling?.classList?.contains('btn-fix')) {
        const fixBtn = document.createElement('button');
        fixBtn.textContent = '🔧 FIX LAST ENTRY (within 5 min)';
        fixBtn.className = 'btn-fix';
        fixBtn.style.cssText = 'background: #e67e22; color: white; border: none; width: 100%; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 8px;';
        fixBtn.addEventListener('click', async () => {
          const manager = document.getElementById(section.managerId).value.trim();
          const covers = parseInt(document.getElementById(section.coversId).value);
          const food = parseFloat(document.getElementById(section.foodId).value);
          const bev = parseFloat(document.getElementById(section.bevId).value);
          
          if (!manager) { showMessage("❌ Enter manager name to fix", true); return; }
          if (isNaN(covers) || covers <= 0) { showMessage("❌ Enter valid covers", true); return; }
          if (isNaN(food) || food <= 0 || isNaN(bev) || bev <= 0) { showMessage("❌ BOTH Food AND Beverage must be > 0", true); return; }
          
          await fixLastEntry(section.name, { manager, covers, food, bev });
          
          // Clear form after fix
          document.getElementById(section.managerId).value = '';
          document.getElementById(section.coversId).value = '';
          document.getElementById(section.foodId).value = '';
          document.getElementById(section.bevId).value = '';
          const totalId = section.id + 'Total';
          if (document.getElementById(totalId)) document.getElementById(totalId).value = '';
          
          if (currentSection === 'analytics') loadAnalyticsData();
        });
        saveBtn.parentNode.insertBefore(fixBtn, saveBtn.nextSibling);
      }
    });
  }

  // Save listeners for each restaurant
  document.querySelector('[data-save="The Restaurant"]').addEventListener('click', async () => {
    const manager = document.getElementById('restManager').value.trim();
    const covers = parseInt(document.getElementById('restCovers').value);

    if (!manager) { showMessage("❌ Enter manager name", true); return; }

    await saveReport("The Restaurant", { manager, covers, food, bev });
    document.getElementById('restManager').value = '';

  document.querySelector('[data-save="Nihon"]').addEventListener('click', async () => {

    await saveReport("Nihon", { manager, covers, food, bev });
    document.getElementById('nihonManager').value = '';

  // Reset all data
  document.getElementById('confirmResetBtn').addEventListener('click', async () => {
    if (!confirm("⚠️ WARNING: This will delete ALL reports from ALL restaurants. Are you ABSOLUTELY sure?")) return;
    const confirmText = prompt("Type 'DELETE' to confirm:");
    if (confirmText !== "DELETE") { showMessage("Reset cancelled", false); return; }
    try {
      const snapshot = await getDocs(collection(db, "dailyReports"));
      let count = 0;
      for (const docSnap of snapshot.docs) {
        await deleteDoc(docSnap.ref);
        count++;
      }
      showMessage(`✅ Deleted ${count} reports successfully`, false);
      if (currentSection === 'analytics') loadAnalyticsData();
    } catch (error) {
      showMessage("❌ Delete failed: " + error.message, true);
    }
  });

  // Analytics data loading
  async function loadAnalyticsData() {
    try {
      const q = query(collection(db, "dailyReports"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      let totalRev = 0, totalFood = 0, totalBev = 0, totalCovers = 0, totalReports = 0;
      let restaurantMap = new Map();
      let reportsHTML = '';
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        const resto = data.restaurant || 'Unknown';
        const total = data.totalRevenue || 0;
        const food = data.foodRevenue || 0;
        const bev = data.beverageRevenue || 0;
        const covers = data.covers || 0;
        totalReports++;
        totalRev += total;
        totalFood += food;
        totalBev += bev;
        totalCovers += covers;
        restaurantMap.set(resto, (restaurantMap.get(resto) || 0) + total);
        const timeStr = data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : 'no date';
        reportsHTML += `<tr>
          <td>${escapeHtml(resto)}</td>
          <td>${escapeHtml(data.manager || '—')}</td>
          <td><strong>${covers}</strong></td>
          <td>${food.toLocaleString()} EGP</td>
          <td>${bev.toLocaleString()} EGP</td>
          <td><strong>${total.toLocaleString()} EGP</strong></td>
          <td style="font-size:0.7rem;">${escapeHtml(timeStr)}</td>
        </tr>`;
      });
      document.getElementById('analyticsTotalRev').innerText = totalRev.toLocaleString() + " EGP";
      document.getElementById('analyticsTotalCovers').innerText = totalCovers.toLocaleString();
      document.getElementById('analyticsFoodRev').innerText = totalFood.toLocaleString() + " EGP";
      document.getElementById('analyticsBevRev').innerText = totalBev.toLocaleString() + " EGP";
      const avgRevenuePerCover = totalCovers > 0 ? (totalRev / totalCovers).toFixed(2) : 0;
      const avgGuestsPerReport = totalReports > 0 ? (totalCovers / totalReports).toFixed(1) : 0;
      document.getElementById('analyticsAvgCover').innerText = avgRevenuePerCover + " EGP";
      document.getElementById('analyticsAvgGuests').innerText = avgGuestsPerReport;
      document.getElementById('analyticsTableBody').innerHTML = reportsHTML || '<tr><td colspan="7" class="empty-state">No reports yet</td></tr>';
      
      if (restaurantChart) {
        restaurantChart.data.datasets[0].data = [
          restaurantMap.get("The Restaurant") || 0,
          restaurantMap.get("Room Service") || 0,
          restaurantMap.get("The Beach House") || 0,
          restaurantMap.get("Nihon") || 0
        ];
        restaurantChart.update();
      }
      if (fbChart) {
        fbChart.data.datasets[0].data = [totalFood, totalBev];
        fbChart.update();
      }
    } catch (error) {
      console.error("Analytics load error", error);
    }
  }

  function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

  function initCharts() {
    const ctx1 = document.getElementById('restaurantChart').getContext('2d');
    restaurantChart = new Chart(ctx1, {
      type: 'bar',
      data: { labels: ['The Restaurant', 'Room Service', 'The Beach House', 'Nihon'], datasets: [{ label: 'Revenue (EGP)', data: [0,0,0,0], backgroundColor: ['#1b5a7a', '#e67e22', '#1f8a4c', '#c0392b'], borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { beginAtZero: true } } }
    });
    const ctx2 = document.getElementById('fbChart').getContext('2d');
    fbChart = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels: ['Food Revenue', 'Beverage Revenue'], datasets: [{ data: [0, 0], backgroundColor: ['#1b5a7a', '#e67e22'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
    });
  }

  function updateDateTime() { document.getElementById('liveDateTime').innerText = new Date().toLocaleString(); }
  updateDateTime();
  setInterval(updateDateTime, 1000);
  
  function showMessage(text, isError = false) {
    const container = document.getElementById('alertContainer');
    container.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">${text}</div>`;
    setTimeout(() => { if(container.firstChild) container.innerHTML = ''; }, 3000);
  }

  // Export PDF
  document.getElementById('exportPdfBtn').addEventListener('click', async () => {
    const q = query(collection(db, "dailyReports"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text("Restaurant Reports", 14, 20);
    let rows = [];
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      rows.push([
        data.restaurant || '', data.manager || '', data.covers || 0,
        data.foodRevenue || 0, data.beverageRevenue || 0, data.totalRevenue || 0,
        data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : ''
      ]);
    });
    doc.autoTable({ startY: 30, head: [['Restaurant','Manager','Covers','Food','Beverage','Total','Date']], body: rows, styles: { fontSize: 8 } });
    doc.save("restaurant_reports.pdf");
  });
  
  // Export Excel
  document.getElementById('exportExcelBtn').addEventListener('click', async () => {
    const q = query(collection(db, "dailyReports"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    let exportData = [];
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      exportData.push({
        Restaurant: data.restaurant || '',
        Manager: data.manager || '',
        Covers: data.covers || 0,
        FoodRevenue: data.foodRevenue || 0,
        BeverageRevenue: data.beverageRevenue || 0,
        TotalRevenue: data.totalRevenue || 0,
        Date: data.createdAt ? new Date(data.createdAt.toDate()).toLocaleString() : ''
      });
    });
    const worksheet = XLSX.utils.json_to_sheet(exportData);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Reports");
    XLSX.writeFile(workbook, "restaurant_reports.xlsx");
  });

  initCharts();
  addFixButtons(); // Add fix buttons to all forms
  showSection('therestaurant');
</script>
